- type: entity
  id: StorePresetUplink
  abstract: true
  components:
  - type: Store
    name: store-preset-name-uplink
    categories:
    - UplinkWeaponry
    - UplinkAmmo
    - UplinkExplosives
    - UplinkChemicals
    - UplinkDeception
    - UplinkDisruption
    - UplinkImplants
    - UplinkChemicalImplants # SS220 - chemical-implants
    - UplinkAllies
    - UplinkWearables
    - UplinkJob
    - UplinkPointless
    - UplinkObjective
    currencyWhitelist:
    - Telecrystal
    balance:
      Telecrystal: 0
    currencyInsertTime: 1.15 #SS220-insert-currency-doafter
    expectedFaction:
    - Syndicate

- type: entity
  id: StorePresetSpellbook
  abstract: true
  components:
  - type: Store
    name: store-preset-name-spellbook
    categories:
    - SpellbookOffensive    #Fireball, Rod Form
    - SpellbookDefensive    #Magic Missile, Wall of Force
    - SpellbookUtility      #Body Swap, Lich, Teleport, Knock, Polymorph
    - SpellbookEquipment    #Battlemage Robes, Staff of Locker
    - SpellbookEvents       #Summon Weapons, Summon Ghosts
    currencyWhitelist:
    - WizCoin
    expectedFaction:
    - Wizard

- type: entity
  id: StorePresetChangeling
  abstract: true
  components:
  - type: Store
    name: store-preset-name-changeling
    # SS220 Changeling-begin
    categories:
    - ChangelingOffensive
    - ChangelingDefensive
    - ChangelingUtility
    - ChangelingStings
    currencyWhitelist:
    - ChangelingEvolution
    balance:
      ChangelingEvolution: 20
    ownerOnly: true
    # SS220 Changeling-end

- type: entity
  parent: StorePresetUplink
  id: StorePresetRemoteUplink
  categories: [ HideSpawnMenu ]
  components:
  - type: RingerAccessUplink
