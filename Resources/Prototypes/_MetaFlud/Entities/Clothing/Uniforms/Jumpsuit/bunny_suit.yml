# Костюм зайчика без колготок

##
## Suits
##

- type: entity
  parent: [ClothingUniformSkirtBase]
  id: ClothingUniformBunnySuitWhite
  name: Белый костюм кролика
  description: Для настоящих кроликов.
  components:
  - type: Sprite
    sprite: MetaFlud/Clothing/Uniforms/Jumpsuit/bunny_suit/suit.rsi
    layers:
    - state: icon
      color: "#ffffff" 
  - type: Clothing
    sprite: MetaFlud/Clothing/Uniforms/Jumpsuit/bunny_suit/suit.rsi
    clothingVisuals:
      jumpsuit:
        - state: equipped-INNERCLOTHING
          color: "#ffffff" 
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left
        color: "#ffffff"  
      right:
      - state: inhand-right
        color: "#ffffff" 

