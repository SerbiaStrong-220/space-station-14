- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckCollar1
  name: чокер с сердцем
  suffix: чокер
  description: Чёрный чокер с розовым сердцем спереди.
  components:
  - type: Sprite
    sprite: MetaFlud/Clothing/Neck/NeckAccessories/collar1.rsi
    scale: 0.8, 0.8
  - type: Clothing
    sprite: MetaFlud/Clothing/Neck/NeckAccessories/collar1.rsi

- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckCollar2
  name: сетчатый чокер
  suffix: чокер
  description: Чёрный сетчатый чокер, плотно облегающий шею.
  components:
  - type: Sprite
    sprite: MetaFlud/Clothing/Neck/NeckAccessories/collar2.rsi
    scale: 0.8, 0.8
  - type: Clothing
    sprite: MetaFlud/Clothing/Neck/NeckAccessories/collar2.rsi

- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckCollar3
  name: чокер с кольцом
  suffix: чокер
  description: Чёрный чокер с металлическим кольцом спереди.
  components:
  - type: Sprite
    sprite: MetaFlud/Clothing/Neck/NeckAccessories/collar3.rsi
    scale: 0.8, 0.8
  - type: Clothing
    sprite: MetaFlud/Clothing/Neck/NeckAccessories/collar3.rsi

