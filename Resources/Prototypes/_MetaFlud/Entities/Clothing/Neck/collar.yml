- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckRibbon
  name: лента
  suffix: чокер
  description: Милая красная лента на шею.
  components:
  - type: Sprite
    sprite: MetaFlud/Clothing/Neck/NeckAccessories/ribbon.rsi
    scale: 0.8, 0.8
  - type: Clothing
    sprite: MetaFlud/Clothing/Neck/NeckAccessories/ribbon.rsi
    quickEquip: true

- type: entity
  parent: ClothingNeckBase
  id: ClothingNeckBellCollarBase
  abstract: true
  name: чокер с колокольчиком
  suffix: чокер
  description: Милый чокер с колокольчиком.
  components:
  - type: EmitSoundOnWearerMove
    sound:
      collection: FootstepJester
      params:
        volume: -6

