# SS220 Changeling
- type: entity
  abstract: true
  parent: BaseAction
  id: BaseChangelingCombatMutationAction
  components:
  - type: Action
    icon: { sprite: Interface/Actions/changeling.rsi, state: armblade }

- type: entity
  parent: BaseChangelingCombatMutationAction
  id: ActionChangelingArmBlade
  name: Arm Blade
  description: Form a deadly arm blade. Its upkeep consumes 0.75 chemicals every two seconds.
  components:
  - type: Action
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: armblade }
  - type: InstantAction
    event: !type:ChangelingArmBladeActionEvent

- type: entity
  parent: BaseChangelingCombatMutationAction
  id: ActionChangelingBoneShard
  name: Bone Shard
  description: Break off a sharp bone shard suitable for throwing.
  components:
  - type: Action
    useDelay: 1
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: bone_shard }
  - type: InstantAction
    event: !type:ChangelingBoneShardActionEvent

- type: entity
  parent: BaseChangelingCombatMutationAction
  id: ActionChangelingResonantShriek
  name: Resonant Shriek
  description: Shatter nearby lights and disorient everyone around you.
  components:
  - type: Action
    useDelay: 5
    checkCanInteract: false
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: shriek_resonant }
  - type: InstantAction
    event: !type:ChangelingResonantShriekActionEvent

- type: entity
  parent: BaseChangelingCombatMutationAction
  id: ActionChangelingSwapForms
  name: Swap Forms
  description: Exchange minds and your evolved mutations with another living body.
  components:
  - type: Action
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: sting_transform }
  - type: TargetAction
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - MobState
    event: !type:ChangelingSwapFormsActionEvent

- type: entity
  parent: BaseChangelingCombatMutationAction
  id: ActionChangelingLastResort
  name: Last Resort
  description: Abandon your body as a vulnerable headslug and incubate in a corpse.
  components:
  - type: Action
    useDelay: 10
    checkCanInteract: false
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: last_resort }
  - type: InstantAction
    event: !type:ChangelingLastResortActionEvent

- type: entity
  parent: BaseChangelingCombatMutationAction
  id: ActionChangelingLayEgg
  name: Implant Egg
  description: Implant yourself into a dead humanoid. A new monkey body hatches after four minutes.
  components:
  - type: Action
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: lay_egg }
  - type: TargetAction
  - type: EntityTargetAction
    canTargetSelf: false
    whitelist:
      components:
      - HumanoidProfile
      - MobState
    event: !type:ChangelingLayEggActionEvent

- type: entity
  parent: BaseChangelingCombatMutationAction
  id: ActionChangelingBiodegrade
  name: Biodegrade
  description: Dissolve restraints and force open a welded container around you.
  components:
  - type: Action
    checkCanInteract: false
    checkConsciousness: false
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: biodegrade }
  - type: InstantAction
    event: !type:ChangelingBiodegradeActionEvent

- type: entity
  parent: BaseChangelingCombatMutationAction
  id: ActionChangelingEpinephrine
  name: Epinephrine Overdose
  description: Instantly recover from incapacitation and gain a brief boost, followed by toxin damage.
  components:
  - type: Action
    useDelay: 10
    checkCanInteract: false
    checkConsciousness: false
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: epinephrine_overdose }
  - type: InstantAction
    event: !type:ChangelingEpinephrineActionEvent

- type: entity
  parent: BaseChangelingCombatMutationAction
  id: ActionChangelingFleshmend
  name: Fleshmend
  description: Rapidly knit your flesh. Repeated use and low temperature reduce its effect.
  components:
  - type: Action
    useDelay: 4
    checkCanInteract: false
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: fleshmend }
  - type: InstantAction
    event: !type:ChangelingFleshmendActionEvent

- type: entity
  parent: BaseChangelingCombatMutationAction
  id: ActionChangelingOrganicShield
  name: Organic Shield
  description: Form a shield that negates six attacks before collapsing.
  components:
  - type: Action
    itemIconStyle: BigAction
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: organic_shield }
  - type: InstantAction
    event: !type:ChangelingOrganicShieldActionEvent

- type: entity
  parent: BaseChangelingCombatMutationAction
  id: ActionChangelingChitinousArmor
  name: Chitinous Armor
  description: Toggle heavy protective plating that slows movement and chemical regeneration.
  components:
  - type: Action
    checkCanInteract: false
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: chitinous_armor }
  - type: InstantAction
    event: !type:ChangelingChitinousArmorActionEvent

- type: entity
  parent: BaseChangelingCombatMutationAction
  id: ActionChangelingAnatomicPanacea
  name: Anatomic Panacea
  description: Purge disease, radiation, toxins, intoxication, and cellular damage.
  components:
  - type: Action
    useDelay: 5
    checkCanInteract: false
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: anatomic_panacea }
  - type: InstantAction
    event: !type:ChangelingAnatomicPanaceaActionEvent

- type: entity
  parent: BaseChangelingCombatMutationAction
  id: ActionChangelingStrainedMuscles
  name: Strained Muscles
  description: Toggle extreme speed at the cost of stamina and nonlethal injury when exhausted.
  components:
  - type: Action
    checkCanInteract: false
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: strained_muscles }
  - type: InstantAction
    event: !type:ChangelingStrainedMusclesActionEvent
