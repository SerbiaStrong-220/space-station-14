- type: entity
  parent: BaseAction
  id: ActionRetractableItemArmBlade
  name: Arm Blade
  description: Shed your flesh and reform it into a fleshy blade.
  components: # SS220 Changeling
  - type: Action
    useDelay: 2
    raiseOnAction: true
    itemIconStyle: BigAction
    icon:
      sprite: _Goobstation/Changeling/changeling_abilities.rsi # SS220 Changeling
      state: armblade
  - type: InstantAction
    event: !type:OnRetractableItemActionEvent
  - type: RetractableItemAction
    spawnedPrototype: ArmBlade
    summonSounds:
      collection: gib # Placeholder
    retractSounds:
      collection: gib # Placeholder

- type: entity
  id: ActionChangelingDevour
  name: "[color=red]Devour[/color]"
  description: Consume the essence of your victims and subsume their identity and mind into your own.
  components:
  - type: Action
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: absorb_biomatter } # SS220 Changeling
    iconOn: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: absorb_biomatter } # SS220 Changeling
    priority: 1
    temporary: false # SS220 Changeling - explicitly deleted by its owning system
  - type: TargetAction
  - type: EntityTargetAction
    event: !type:ChangelingDevourActionEvent

- type: entity
  id: ActionChangelingTransform
  name: "[color=red]Transform[/color]"
  description: Transform and assume the identities of those you have devoured.
  components:
  - type: Action
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: transform } # SS220 Changeling
    temporary: false # SS220 Changeling - explicitly deleted by its owning system
  - type: InstantAction
    event: !type:ChangelingTransformActionEvent

- type: entity
  parent: ActionIntrinsicStore
  id: ActionChangelingStore
  name: Evolution Menu # SS220 Changeling
  description: Opens the changeling evolution menu. # SS220 Changeling
  components:
  - type: Action
    icon: { sprite: _Goobstation/Changeling/changeling_abilities.rsi, state: evolution_menu } # SS220 Changeling
