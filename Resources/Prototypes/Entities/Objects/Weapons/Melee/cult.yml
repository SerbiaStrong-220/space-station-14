- type: entity
  name: ritual dagger
  parent: BaseItem
  id: RitualDagger
  description: A strange dagger used by sinister groups for rituals and sacrifices.
  components:
  - type: EmitSoundOnLand
    sound:
      path: /Audio/SS220/Effects/Drop/blade.ogg ##new sound_drop effect, add MIXnikita
      params:
        volume: 2
  - type: Sharp
  - type: Sprite
    sprite: Objects/Weapons/Melee/cult_dagger.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 1.5
    damage:
      types:
        Slash: 15 #SS220 weapon overhaul
  - type: Item
    size: Normal
  - type: Clothing
    sprite: Objects/Weapons/Melee/cult_dagger.rsi
    slots:
    - back
  - type: DisarmMalus

- type: entity
  name: eldritch blade
  parent: BaseItem
  id: EldritchBlade
  description: A sword humming with unholy energy.
  components:
  - type: EmitSoundOnLand
    sound:
      path: /Audio/SS220/Effects/Drop/blade.ogg ##new sound_drop effect, add MIXnikita
      params:
        volume: 2
  - type: Sharp
  - type: Sprite
    sprite: Objects/Weapons/Melee/cult_blade.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 0.75
    damage:
      types:
        Slash: 19 #SS220 weapon overhaul
  - type: Item
    size: Normal
  - type: Clothing
    sprite: Objects/Weapons/Melee/cult_blade.rsi
    slots:
    - back
  #SS220 melee weapon block added begin
  - type: AltBlocking
    rangeBlockProb: 0
    meleeBlockProb: 0
    activeRangeBlockProb: 0
    activeMeleeBlockProb: 0.5 # Well, it should depend on the user's melee weapon skill but unfortunately there is none as for now
  - type: Damageable
    damageContainer: Invulnerable
  - type: ArmorBlock
  - type: AltArmor
    tresholddict:
      Piercing: 10
      Blunt: 25
      Heat: 15
      Slash: 30
      Radiation: 1000
      Poison: 1000
      Airloss: 1000
      Caustic: 1000
    durabilitytresholddict:
      Piercing: 10000
      Blunt: 10000
      Heat: 10000
      Slash: 10000
      Radiation: 10000
      Poison: 1000
      Airloss: 1000
      Caustic: 1000
  - type: InstastunResist
    resistedStunTypes:
      - Creampie
      - Projectile
    active: false
  #SS220 melee weapon block added end
  - type: DisarmMalus

- type: entity
  name: unholy halberd
  parent: BaseItem
  id: UnholyHalberd
  description: A poleaxe that seems to be linked to its wielder.
  components:
  - type: EmitSoundOnLand
    sound:
      path: /Audio/SS220/Effects/Drop/axe.ogg ##new sound_drop effect, add MIXnikita
      params:
        volume: 2
  - type: Tag
    tags:
    - FireAxe
  - type: Sharp
  - type: Sprite
    sprite: Objects/Weapons/Melee/cult_halberd.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 0.75
    damage:
      types:
        Blunt: 10
        Slash: 10
        Structural: 5
    soundHit:
      collection: MetalThud
  - type: Wieldable
  - type: IncreaseDamageOnWield
    damage:
      types:
        Blunt: 5
        Slash: 5
        Structural: 10
  - type: Item
    size: Ginormous
  - type: Clothing
    sprite: Objects/Weapons/Melee/cult_halberd.rsi
    quickEquip: false
    slots:
    - back
  #SS220 melee weapon block added begin
  - type: AltBlocking
    rangeBlockProb: 0
    meleeBlockProb: 0
    activeRangeBlockProb: 0
    activeMeleeBlockProb: 0.6
  - type: Damageable
    damageContainer: Invulnerable
  - type: ArmorBlock
  - type: AltArmor
    tresholddict:
      Piercing: 10
      Blunt: 25
      Heat: 15
      Slash: 30
      Radiation: 1000
      Poison: 1000
      Airloss: 1000
      Caustic: 1000
    durabilitytresholddict:
      Piercing: 10000
      Blunt: 10000
      Heat: 10000
      Slash: 10000
      Radiation: 10000
      Poison: 1000
      Airloss: 1000
      Caustic: 1000
  - type: InstastunResist
    resistedStunTypes:
      - Creampie
      - Projectile
    active: false
  #SS220 melee weapon block added end
  - type: UseDelay
    delay: 1
