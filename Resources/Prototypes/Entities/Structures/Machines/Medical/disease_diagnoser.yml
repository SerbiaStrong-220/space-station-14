- type: entity
  id: DiseaseDiagnoser
  parent: [ BaseMachinePowered, SmallConstructibleMachine ]
  name: Disease Diagnoser Delta Extreme
  description: A machine that analyzes disease samples.
  placement:
    mode: SnapgridCenter
  components:
  # SS220-Start
  - type: Sprite
    sprite: SS220/Structures/Machines/diagnoser.rsi
    snapCardinals: true
    layers:
    # always-visible machine body; everything below is an independent overlay on top of it
    - state: icon
    - state: turned_on
      map: ["enum.VirusDiagnoserVisualLayers.Powered"]
      visible: false
    - state: running
      map: ["enum.VirusDiagnoserVisualLayers.Running"]
      visible: false
    - state: vial_installed_empty
      map: ["enum.VirusDiagnoserVisualLayers.Vial"]
      visible: false
    - state: fill-1
      map: ["enum.VirusDiagnoserVisualLayers.Buffer"]
      visible: false
  - type: Appearance
  - type: GenericVisualizer
    visuals:
      # powered overlay — toggled automatically by the power system
      enum.PowerDeviceVisuals.Powered:
        enum.VirusDiagnoserVisualLayers.Powered:
          "True": { visible: true }
          "False": { visible: false }
      enum.VirusDiagnoserVisuals.Running:
        enum.VirusDiagnoserVisualLayers.Running:
          "True": { visible: true }
          "False": { visible: false }
      enum.VirusDiagnoserVisuals.Vial:
        enum.VirusDiagnoserVisualLayers.Vial:
          "None": { visible: false }
          "Blood": { visible: true, state: vial_installed_blood }
          "Empty": { visible: true, state: vial_installed_empty }
          "Mutagen": { visible: true, state: vial_installed_mutagen }
  - type: VirusDiagnoserBufferVisuals
  # SS220-End
  - type: Machine
    board: DiagnoserMachineCircuitboard
  # SS220-Start
  - type: VirusDiagnoser
  - type: ItemSlots
    slots:
      diagnoserSlot:
        whitelist:
          components:
          - FitsInDispenser
  - type: ContainerContainer
    containers:
      machine_board: !type:Container
      machine_parts: !type:Container
      diagnoserSlot: !type:ContainerSlot
  - type: SolutionContainerManager
    solutions:
      buffer:
        maxVol: 100
  - type: ActivatableUI
    key: enum.VirusDiagnoserUiKey.Key
  - type: ActivatableUIRequiresPower
  - type: UserInterface
    interfaces:
      enum.VirusDiagnoserUiKey.Key:
        type: VirusDiagnoserBoundUserInterface
  # SS220-End

- type: entity
  name: disease diagnoser report
  parent: Paper
  id: DiagnosisReportPaper
  description: 'A chilling medical receipt.'
  components:
  - type: Sprite
    sprite: Objects/Misc/bureaucracy.rsi
    layers:
    - state: paper_receipt
    - state: paper_receipt_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: false
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: PaperVisuals
    backgroundImagePath: "/Textures/Interface/Paper/paper_background_perforated.svg.96dpi.png"
    headerImagePath: "/Textures/Interface/Paper/paper_heading_virus.svg.96dpi.png"
    headerMargin: 0.0, 0.0, 0.0, 6.0
    backgroundImageTile: true
    backgroundPatchMargin: 0.0, 6.0, 0.0, 6.0
    contentMargin: 12.0, 0.0, 12.0, 0.0
    # This is a narrow piece of paper
    maxWritableArea: 128.0, 0.0
