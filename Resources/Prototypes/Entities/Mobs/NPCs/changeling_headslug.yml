# SS220 Changeling
- type: entity
  parent: [ SimpleMobBase, BaseMobAnimal, MobCombat, MobPassiveCollision ]
  id: MobChangelingHeadslug
  name: headslug
  description: A tiny, desperate knot of alien flesh.
  components:
  - type: ChangelingHeadslug
  - type: MovementSpeedModifier
    baseWalkSpeed: 3
    baseSprintSpeed: 5
  - type: Sprite
    drawdepth: SmallMobs
    sprite: _Goobstation/Changeling/headcrab.rsi
    layers:
    - map: [ "enum.DamageStateVisualLayers.Base" ]
      state: headcrab
  - type: DamageStateVisuals
    states:
      Alive:
        Base: headcrab
      Critical:
        Base: headcrab_dead
      Dead:
        Base: headcrab_dead
  - type: MobThresholds
    thresholds:
      0: Alive
      10: Critical
      20: Dead
  - type: Stamina
    baseCritThreshold: 10
  - type: ActionGrant
    actions:
    - ActionChangelingLayEgg
