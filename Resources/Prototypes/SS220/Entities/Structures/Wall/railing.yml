- type: entity
  parent: BaseRailing
  id: CurbWood
  suffix: For mapping
  components:
  - type: Sprite
    drawdepth: FloorTiles
    sprite: /Textures/SS220/Structures/Walls/curb.rsi
    state: curbwood
  - type: Icon
    sprite: /Textures/SS220/Structures/Walls/curb.rsi
    state: curbwood
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.49,-0.49,0.49,-0.4"
        density: 1000
        mask:
        - TableMask
        layer:
        - TableLayer
  - type: Damageable
    damageContainer: StructuralInorganic
    damageModifierSet: Wood
  - type: RCDDeconstructable
    cost: 3
    delay: 4
    fx: EffectRCDDeconstruct2
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 450
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: WoodDestroy
      - !type:SpawnEntitiesBehavior
        spawn:
          MaterialWoodPlank:
            min: 1
            max: 2
      - !type:DoActsBehavior
        acts: [ "Destruction" ]
  - type: Construction
    node: railing

