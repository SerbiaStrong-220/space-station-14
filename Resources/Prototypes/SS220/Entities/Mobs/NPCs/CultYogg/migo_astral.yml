# EULA/CLA with a hosting restriction, full text: https://raw.githubusercontent.com/SerbiaStrong-220/space-station-14/master/CLA.txt

- type: entity
  name: jaunt
  parent: [Incorporeal, BaseMob]
  id: BaseMobAstral
  abstract: true
  description: Faint traces of a humanoid figure linger here
  components:
  - type: ContentEye
    maxZoom: 1.44,1.44
  - type: Eye
    drawFov: false
    visMask:
      - Normal
      - Ghost #somehow actions visible only with this one
  - type: Input
    context: "ghost"
  - type: InputMover
  - type: MovementSpeedModifier
    baseSprintSpeed: 12
    baseWalkSpeed: 8
  - type: Visibility
    layer: 2
  - type: Spectral

- type: entity
  name: jaunt
  parent: BaseMobAstral
  id: MobAstralMiGo
  noSpawn: true
  suffix: CultYogg
  components:
  - type: Sprite
    sprite: SS220/Mobs/CultYogg/MiGo.rsi
    color: "#bbbbff88"
    layers:
      - map: [ "enum.MiGoVisual.Base", "enum.DamageStateVisualLayers.Base"]
        state: alive
    noRot: true
    overrideContainerOcclusion: true
    drawdepth: Ghosts
  - type: MiGoTeleport
  - type: UserInterface
    interfaces:
      enum.MiGoTeleportUiKey.Key:
        type: MiGoTeleportBoundUserInterface
  - type: ShowCultYoggIcons #not sure
  - type: PolymorphTimer
    polymorphTimerAlert: MiGoAstralAlert

- type: polymorph
  id: MiGoInAstral
  configuration:
    entity: MobAstralMiGo
    transferName: true
    inventory: None
    revertOnDeath: true
    revertOnCrit: true
    allowRepeatedMorphs: false
    polymorphSound: /Audio/SS220/CultYogg/migo_astral_in.ogg
    exitPolymorphSound: /Audio/SS220/CultYogg/migo_astral_out.ogg
    duration: 35

- type: entity
  parent: BaseActionPolymorph
  id: ActionMiGoAstral2
  name: Access to the astral
  description: Step into the interdimensional realm.
  components:
  - type: Action
    useDelay: 30
    icon:
    sprite: SS220/Interface/Actions/cult_yogg.rsi
    state: migoastral
  - type: InstantAction
    event: !type:PolymorphActionEvent
      protoId: MiGoInAstral
