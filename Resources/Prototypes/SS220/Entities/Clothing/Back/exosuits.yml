- type: entity
  parent: Clothing
  id: ClothingBackpackExo
  name: exosuit powerpack
  description: This power module allows your exoskeleton to operate.
  components:
  - type: Sprite
    sprite: SS220/Clothing/OuterClothing/Misc/industrial_exosuit_backpack.rsi
    state: icon
  - type: Item
    size: Huge
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
  - type: Clothing
    quickEquip: false
    slots:
    - back
  - type: Tag
    tags:
    - WhitelistChameleon

- type: entity
  parent: [Clothing, BaseToggleClothing]
  id: ClothingBackpackExoCybersun
  name: exosuit powerpack
  description: This power module allows your power armor to operate and has integrated field shield generator.
  components:
  - type: Sprite
    sprite: SS220/Clothing/Back/Backpacks/cybersun_exosuit_backpack.rsi
    state: icon
  - type: Item
    size: Huge
  - type: PowerCellSlot
    cellSlotId: cell_slot
  - type: ItemSlots
    slots:
      cell_slot:
        name: power-cell-slot-component-slot-name-default
        startingItem: PowerCellMedium
  - type: FieldShieldProvider
    rechargeShieldData:
      rechargeTime: 40
    shieldData:
      shieldMaxCharge: 6
      shieldSprite:
        sprite: SS220/Effects/field_shield.rsi
        state: red
    lightData:
      color: "#D82000"
      radius: 1.5
      energy: 6
  - type: ToggleClothing
    action: ActionTogglePersonalShield
    disableOnUnequip: true
  - type: Clothing
    quickEquip: false
    slots:
    - back
  - type: Tag
    tags:
    - WhitelistChameleon

