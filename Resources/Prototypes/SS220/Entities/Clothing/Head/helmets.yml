- type: entity
  parent: ClothingHeadHelmetBasic
  id: ClothingHeadHelmetTactical
  name: tactical security helmet
  description: A tactical helmet for the most elite NT security officers.
  suffix: За время в игре
  components:
  - type: Sprite
    sprite: SS220/Clothing/Head/Helmets/opscore.rsi
  - type: Clothing
    sprite: SS220/Clothing/Head/Helmets/opscore.rsi

#Military Police Helmet #by MIXnikita for SS200
- type: entity
  parent: ClothingHeadBase
  id: ClothingHeadHelmetMpolice
  name: Military Police helmet
  description: this is a reliable protection for detention.
  components:
  - type: Sprite
    sprite: Clothing/Head/Helmets/mpolice.rsi
  - type: Clothing
    sprite: Clothing/Head/Helmets/mpolice.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.80
        Slash: 0.80
        Piercing: 0.80
        Heat: 0.80
        Radiation: 0.80
        Caustic: 0.95
  - type: ExplosionResistance
    damageCoefficient: 0.75

#SyndicateReporter
- type: entity
  parent: [ ClothingHeadBase, BaseSyndicateContraband ]
  id: ClothingHeadUmbrellaHelmet
  name: umbrella helmet
  description: A little heavier than usual.
  components:
  - type: Sprite
    sprite: SS220/Clothing/Head/Helmets/umbrella_helmet.rsi
  - type: Clothing
    sprite: SS220/Clothing/Head/Helmets/umbrella_helmet.rsi
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.9
        Slash: 0.9
        Piercing: 0.95
        Heat: 0.95
        Radiation: 0.95
        Caustic: 0.95
  - type: Blocking
    passiveBlockModifier:
      coefficients:
        Blunt: 0.1
        Slash: 0.1
        Piercing: 0.1
    activeBlockModifier:
      coefficients:
        Blunt: 0.05
        Slash: 0.05
        Piercing: 0.05
  - type: Reflect
    reflectProb: 0.42
    reflects:
      - NonEnergy
    spread: 90
  - type: Damageable
    damageContainer: Shield
  - type: Destructible
    thresholds:
      - trigger:
          !type:DamageTrigger
          damage: 60
        behaviors:
          - !type:DoActsBehavior
            acts: [ "Destruction" ]
          - !type:PlaySoundBehavior
            sound:
              collection: MetalBreak
  - type: Tag
    tags:
    - HamsterWearable
