#Экзокостюм утилизаторов
- type: entity
  parent: ClothingOuterStorageToggleableBase
  id: ClothingOuterExosuitSalvage
  name: salvage exosuit
  description: A specialized hooded suit that barely restricts movement while providing decent protection.
  components:
  - type: Sprite
    sprite: SS220/Clothing/OuterClothing/Misc/salvage_exosuit.rsi
  - type: Clothing
    sprite: SS220/Clothing/OuterClothing/Misc/salvage_exosuit.rsi
  - type: ExplosionResistance
    damageCoefficient: 0.9
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.85
        Heat: 0.85
        Caustic: 0.85
        Radiation: 0.85
  - type: StaminaResistance
    damageCoefficient: 0.9
  - type: ClothingSpeedModifier
    walkModifier: 1
    sprintModifier: 0.90
  - type: ToggleableClothing
    clothingPrototype: ClothingHeadHatHoodExosuitSalvage

#Промышленный экзоскелет
- type: entity
  parent: ClothingOuterBaseMedium
  id: ClothingOuterExosuit
  name: industrial exoskeleton
  description: A specialised powered exoskeleton made to increase muscle strength.
  components:
  - type: Sprite
    sprite: SS220/Clothing/OuterClothing/Misc/industrial_exosuit.rsi
  - type: Clothing
    sprite: SS220/Clothing/OuterClothing/Misc/industrial_exosuit.rsi
    quickEquip: false
    equipDelay: 4
    unequipDelay: 4
  - type: PhysicalParametersModifyingClothing
  - type: IntegratedClothing
    clothingPrototypes:
      back: ClothingBackpackExo
      gloves: ClothingHandsGlovesCombat
      shoes: ClothingShoesBootsMagExo
    slots: [ back, gloves, shoes ]
  - type: Armor
    modifiers:
      coefficients:
        Blunt: 0.85
        Slash: 0.85
        Piercing: 0.85
        Heat: 0.85
        Caustic: 0.85
        Radiation: 0.85
  - type: StaminaResistance
    damageCoefficient: 0.9

