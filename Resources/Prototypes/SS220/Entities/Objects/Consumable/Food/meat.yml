- type: entity
  name: spider steak
  parent: FoodMeatBase
  id: FoodMeatSpiderSteak
  description: A cooked spider. Smells primal.
  components:
  - type: Tag
    tags:
    - Cooked
    - Meat
    - Steak
  - type: Sprite
    sprite: SS220/Objects/Consumable/Food/meat.rsi
    state: spider-grilled
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: Nutriment
          Quantity: 10
        - ReagentId: Protein
          Quantity: 5
  - type: SliceableFood
    count: 3
    slice: FoodMeatSpiderCutletCooked
  - type: Item
    inhandVisuals:
      left:
      - state: spider-inhand-left-grilled
      right:
      - state: spider-inhand-right-grilled

- type: entity
