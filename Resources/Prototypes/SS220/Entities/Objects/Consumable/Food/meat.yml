- type: entity
  parent: FoodMeatBase
  id: FoodCutletBase
  abstract: true
  components:
  - type: InternalTemperature
    thickness: 0.06

- type: entity
  parent: FoodMeatBase
  id: FoodMeatRabbit
  name: raw rabbit meat
  description: A raw rabbit meat
  components:
  - type: Tag
    tags:
    - Raw
    - Meat
  - type: Sprite
    sprite: SS220/Objects/Consumable/Food/meat.rsi
    state: rabbit
  - type: SolutionContainerManager
    solutions:
      food:
        reagents:
        - ReagentId: UncookedAnimalProteins
          Quantity: 5
        - ReagentId: Fat
          Quantity: 3
  - type: Construction
    graph: RabbitSteak
    node: start
    defaultTarget: cooked rabbit
  - type: Item
    inhandVisuals:
      left:
      - state: rabbit-inhand-left
      right:
      - state: rabbit-inhand-right

