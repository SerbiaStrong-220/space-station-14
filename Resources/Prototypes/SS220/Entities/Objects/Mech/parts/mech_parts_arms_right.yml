      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: start
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  id: RightMedicalMultitoolArm
  parent: BaseMechRightArm
  name: medical multitool (right)
  description: A module that consists of three flexible manipulators two of which have small, precise and relatively weak cybernetic hands and the other one has a non-detachable hypospray on it. This one fits into a standard mech's right hand slot
  components:
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_clamp
  - type: MechArm
    hands:
    - hand:
        location: Right
        whitelist:
          sizes:
          - Tiny
          - Small
          - Normal
        damageOverride:
          types:
            Slash: 5
        strengthModifier: 0.3
        attackRate: 2.5
        altDisarm: false
        autoAttack: true
    - hand:
        location: Right
        whitelist:
          sizes:
          - Tiny
          - Small
          - Normal
        damageOverride:
          types:
            Slash: 5
        strengthModifier: 0.3
        attackRate: 2.5
        altDisarm: false
        autoAttack: true
    - hand:
        location: Right
        strengthModifier: 0.8
      item: BorgHypo
  - type: Item
    inhandVisuals:
      left:
