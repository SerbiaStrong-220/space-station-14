- type: entity
  id: HydraulicRightArm
  parent: BaseMechRightArm
  name: hydraulic arm (right)
  description: "Old but gold - hydraulic pistons, electromagnetic valves and tens of kilograms of steel. \nA heavy, unprecise and bulky but very strong manipulator."
  components:
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_clamp
  - type: MechArm
    hands:
    - hand:
        location: Right
        whitelist:
          sizes:
          - Ginormous
          - Gigantic
        damageOverride:
          types:
            Blunt: 40
            Structural: 50
        altDisarm: false
        strengthModifier: 6
        soundHit:
          path: /Audio/Effects/metal_thud1.ogg
          params:
            variation: 0.10
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-big
      right:
      - state: inhand-right-big
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 150
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: start
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: MechPart
    integrity: 150
    maxIntegrity: 150
    ownMass: 120
    attachedSprite:
      sprite: SS220/Objects/Mechs/righthand.rsi
      state: basichydraulic

- type: entity
  id: RightServoArm
  parent: BaseMechRightArm
  name: servo arm (right)
  description: A servo-based manipulator made to fit into a standard mech right arm slot. It is way more presize than its hydraulic sibling but also much weaker
  components:
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_clamp
  - type: MechArm
    hands:
    - hand:
        location: Right
        whitelist:
          sizes:
          - Ginormous
          - Huge
          - Large
          - Normal
        strengthModifier: 3.8
        damageOverride:
          types:
            Blunt: 20
            Structural: 10
        altDisarm: false
        attackRate: 1.5
  - type: Item
    inhandVisuals:
      left:
