- type: entity
  id: MechVisorBasic
  parent: BaseMechHead
  name: mech visor
  description: Oldschool high-res camera module. Has integrated auto-shading lenses so you can weld while using it.
  components:
  - type: FlashImmunity
  - type: EyeProtection
  - type: Sprite
    sprite: SS220/Objects/Mechs/items/mecha_parts.rsi
    state: visor_basic
  - type: MechPart
    integrity: 70
    maxIntegrity: 70
    attachedSprite:
      sprite: SS220/Objects/Mechs/heads.rsi
      state: welding
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 70
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: start
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  id: MechVisorMedical
  parent: BaseMechHead
  name: anatomically aware mech visor
  description: A camera module with a health analysing sensor array attached to it.
  components:
  - type: FlashImmunity
  - type: EyeProtection
  - type: Sprite
    sprite: SS220/Objects/Mechs/items/mecha_parts.rsi
    state: visor_basic
  - type: MechPart
    integrity: 50 #a large sensor array is not very durable
    maxIntegrity: 50
    attachedSprite:
      sprite: SS220/Objects/Mechs/heads.rsi
