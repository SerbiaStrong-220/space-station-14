      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: start
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-big
      right:
      - state: inhand-right-big

- type: entity
  id: ArmoredSynthChassis
  parent: BaseMechChassis
  name: executor-class chassis
  description: Mech chassis driven by artificial muscles. It is lighter than hydraulic, has much higher reaction speed and way more flexible. This one has plastitanium frame and heavy armor.
  components:
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_clamp
  - type: ArmorBlock # Ah yes,my beloved СБЭУ
    durabilitytresholddict:
        Radiation: 1000
        Poison: 1000
        Airloss: 1000
        Caustic: 1000
        Piercing: 120
        Blunt: 115
        Heat: 120
        Slash: 70
        Shock: 150
  - type: MechChassis
    maximalMass: 950
    baseMovementSpeed: 5.6
    acceleration: 10
    efficiency: 0.01
  - type: MechPart
    integrity: 300
    maxIntegrity: 300
    ownMass: 160
    attachedSprite:
      sprite: SS220/Objects/Mechs/chassis.rsi
      state: armoredsynth
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: start
      - !type:DoActsBehavior
        acts: ["Destruction"]
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-big
      right:
      - state: inhand-right-big
