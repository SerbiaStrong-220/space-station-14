- type: entity
  id: MechEquipmentBase
  parent: BaseItem
  abstract: true
  components:
  - type: Item
    size: Ginormous
  - type: AltMechEquipment

- type: entity
  id: ShoulderReinforcement
  parent: MechEquipmentBase
  name: mech shoulder reinforcement
  description: "Set of steel planks, joints and servos that reinforce mech's 'spine' and 'shoulders', allowing to install heavier arms on it. \nSide effects are increase of structural integrity and mass"
  components:
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_clamp
  - type: AltMechEquipment
    ownMass: 50
  - type: MechEquipmentStatModifier
    maximalArmMassDelta: 40
    maxIntegrityDelta: 30

- type: entity
  id: FrameReinforcementMechMod
  parent: MechEquipmentBase
  name: mech frame reinforcement
  description: "Additional steel reinforcement for the frame of the mech. Increases structural integrity but is also pretty heavy."
  components:
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_clamp
  - type: AltMechEquipment
    ownMass: 30
  - type: MechEquipmentStatModifier
    maxIntegrityDelta: 60

- type: entity
  id: CompositeFrameMechMod
  parent: MechEquipmentBase
  name: mech composite frame
  description: "Composite replacements for least stressed parts of the frame. They are lighter but less durable."
  components:
  - type: Item
    size: Ginormous
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_clamp
  - type: AltMechEquipment
    ownMass: -30
  - type: MechEquipmentStatModifier
    maxIntegrityDelta: -60

- type: entity
  id: MagneticPadMechMod
  parent: MechEquipmentBase
  name: mech magpads
  description: "Magpads for the mech's feet."
  components:
  - type: Item
    size: Ginormous
  - type: Actions
  - type: ActionsContainer
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_clamp
  - type: Magboots
  - type: AltMechEquipment
    ownMass: 10
  - type: MechEquipmentAction
    equipmentAbilityActionName: ActionToggleMagpads
  - type: ItemToggle
  - type: ToggleableMechEquipment

- type: entity
  parent: BaseAction
  id: ActionToggleMagpads
  name: Toggle Magpads
  description: Toggles the magpads on and off.
  components:
  - type: Action
    itemIconStyle: BigItem
  - type: InstantAction
    event: !type:ToggleActionEvent

- type: entity
  id: JetpackMechModBasic
  parent: MechEquipmentBase
  name: mech ionic jetpack
  description: "Set of ionic thrusters that can be attached to a mech. They need no gas or fuel to operate but consume lots of energy. This one is low-end, simple and cheap."
  components:
  - type: Item
    size: Ginormous
  - type: Actions
  - type: ActionsContainer
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_clamp
  - type: PowerConsumingJetpack
  - type: Jetpack
    moleUsage: 0
    acceleration: 0.25
    friction: 0.2
  - type: AltMechEquipment
    ownMass: 5
    eqipmentSize: 10
  - type: MechEquipmentAction
    equipmentAbilityActionName: ActionToggleJetpack

- type: entity
  id: JetpackMechMod
  parent: MechEquipmentBase
  name: mech ionic jetpack
  description: "Set of ionic thrusters that can be attached to a mech. They need no gas or fuel to operate but consume lots of energy. This one is gold standart and widely used."
  components:
  - type: Item
    size: Ginormous
  - type: Actions
  - type: ActionsContainer
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_clamp
  - type: PowerConsumingJetpack
    powerConsumption: 5
  - type: Jetpack
    moleUsage: 0
    acceleration: 0.5
    friction: 0.25
  - type: AltMechEquipment
    ownMass: 10
    eqipmentSize: 20
  - type: MechEquipmentAction
    equipmentAbilityActionName: ActionToggleJetpack

- type: entity
  id: JetpackMechModAdvanced
  parent: MechEquipmentBase
  name: mech ionic jetpack
  description: "Set of ionic thrusters that can be attached to a mech. They need no gas or fuel to operate but consume lots of energy. This one is extended, heavy and consumes pretty much energy."
  components:
  - type: Item
    size: Ginormous
  - type: Actions
  - type: ActionsContainer
  - type: Sprite
    sprite: Objects/Specific/Mech/mecha_equipment.rsi
    state: mecha_clamp
  - type: PowerConsumingJetpack
    powerConsumption: 8
  - type: Jetpack
    moleUsage: 0
    acceleration: 0.8
    friction: 0.25
  - type: AltMechEquipment
    ownMass: 15
    eqipmentSize: 30
  - type: MechEquipmentAction
    equipmentAbilityActionName: ActionToggleJetpack
