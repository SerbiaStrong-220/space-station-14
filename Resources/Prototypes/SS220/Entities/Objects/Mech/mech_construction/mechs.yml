- type: entity
  id: MechLoaderFrame
  name: Powerloader frame
  description: Vast bulk of a simple-yet-reliable mech.
  components:
  - type: Clickable
  - type: InteractionOutline
  - type: Physics
    bodyType: Dynamic
    fixedRotation: false
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeAabb
          bounds: "-0.25,-0.25,0.25,0.25"
        density: 100
        mask:
        - MobMask
        layer:
        - MobLayer
        restitution: 0.3
        friction: 0.2
  - type: Sprite
    noRot: true
    drawdepth: Items
    sprite: SS220/Objects/Mechs/coresfinal.rsi
    state: basicloader
  - type: Appearance
  - type: ContainerContainer
    containers:
      part-container: !type:Container
  - type: Construction
    graph: PowerloaderFrame
    node: powerloaderframe
    containers:
    - part-container
  - type: Pullable

