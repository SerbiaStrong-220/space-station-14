- type: entity
  parent: [BaseMob, StripableInventoryBase]
  id: BaseAltMech
  save: false
  abstract: true
  components:
  - type: CombatMode
  - type: NoSlip
  - type: MechPart
  - type: ComplexInteraction
  - type: StatusEffectContainer
  - type: MobMover
  - type: ArmorBlock
  - type: Stripping
  - type: Sprite
    layers:
      - map: [ "enum.MechPartVisualLayers.Chassis" ]
        visible: false
      - map: [ "enum.MechPartVisualLayers.ChassisColored" ]
        visible: false
      - sprite: SS220/Objects/Mechs/altcores.rsi
        state: basicloader
        map: [ "enum.MechPartVisualLayers.Core" ]
        visible: true
      - sprite: SS220/Objects/Mechs/altcores.rsi
        state: basicloadercolor
        map: [ "enum.MechPartVisualLayers.CoreColored" ]
        color: "#ff6e52"
        visible: true
      - map: [ "enum.MechPartVisualLayers.Head" ]
        visible: false
      - map: [ "enum.MechPartVisualLayers.HeadColored" ]
        visible: false
      - map: [ "enum.MechPartVisualLayers.Power" ]
        visible: false
      - map: [ "enum.MechPartVisualLayers.PowerColored" ]
        visible: false
      - map: [ "enum.MechPartVisualLayers.RightArm" ]
        visible: false
      - map: [ "enum.MechPartVisualLayers.RightArmColored" ]
        visible: false
      - map: [ "enum.MechPartVisualLayers.LeftArm" ]
        visible: false
      - map: [ "enum.MechPartVisualLayers.LeftArmColored" ]
        visible: false
    noRot: true
  - type: Flammable
    fireSpread: true
    canResistFire: true
    damage:
      types:
        Heat: 0
  - type: PhysicalParameters
  - type: AltMech
    pilotWhitelist:
      components:
        - HumanoidProfile
  - type: PowerCellDraw
  - type: Blindable #For optics to work
  - type: StatusEffects
    allowed:
    - Flashed
  - type: PressureProtection #After some research i decided to get rid of MechAir as there will be basically no difference in game but larger amounts of work and space for bugs
    highPressureMultiplier: 0.05
    lowPressureMultiplier: 1000
  - type: FireProtection
    reduction: 1
  - type: MobCollision
    colliding: false
    strength: 150
    fixtureId: "flammable"
  - type: DoAfter
  - type: UserInterface
    interfaces:
      enum.MechUiKey.Key:
        type: AltMechBoundUserInterface
      enum.StrippingUiKey.Key:
        type: StrippableBoundUserInterface
  - type: Puller
    needsHands: false
  - type: InputMover
  - type: InteractionOutline
  - type: ComplexRepairable
    material: SheetSteel
    materialRepairTreshold: 10.0
    doAfterModifier: 3
  - type: Inventory
    templateId: mech
  - type: TemperatureProtection
    heatingCoefficient: 0.005
    coolingCoefficient: 0.005
  - type: MovementSpeedModifier
    baseWalkSpeed: 0
    baseSprintSpeed: 0
  - type: Tag
    tags:
    - DoorBumpOpener
    - FootstepSound
  - type: Pullable
  - type: Physics
    bodyType: KinematicController
  - type: GravityAffected
  - type: Clickable
  #- type: WiresPanel
  - type: Language
  - type: HealthExaminable
    examinableTypes:
      - Blunt
      - Slash
      - Piercing
      - Heat
      - Shock
    locPrefix: silicon
  - type: Hands
    showInHands: false
    disableExplosionRecursion: true
    canBeStripped: true
    handsOverrideDamage: true
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.45
        density: 1000
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Appearance
  - type: IntrinsicRadioReceiver
  - type: MeleeWeapon
    attackRate: 1
    damage:
      types:
        Blunt: 0
  - type: ActiveRadio
  - type: ZombieImmune
  - type: ItemSlots
    slots:
      mech-tank-slot:
        name: GasTank
        priority: 2
        whitelist:
          tags:
            - GasTank
  - type: ContainerContainer
    containers:
      mech-pilot-slot: !type:ContainerSlot
      mech-battery-slot: !type:ContainerSlot
      mech-tank-slot: !type:ContainerSlot
  - type: Damageable
    damageContainer: Inorganic
  - type: FootstepModifier
    footstepSoundCollection:
      path: /Audio/Mecha/mechmove03.ogg
  - type: GuideHelp
    guides:
    - Robotics
  - type: VoiceInheritor #SS220 voice inheritor added
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 400
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: start
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  id: MechLoader
  parent: BaseAltMech
  name: Powerloader
  description: Name is self-speaking - this is a powerloader frame which has limited equipment space, high mass, cannot be sealed and provides little to no protection to the user but is still better than nothing
  components:
  - type: AltArmor # Ah yes,my beloved СБЭУ
    tresholddict:
      Radiation: 1000 # As always mechs do not care about radiation/poison/airloss/etc.
      Poison: 1000
      Airloss: 1000
      Caustic: 1000
      Piercing: 18 #Numbers higher compared to a strikeproof shield, bullets/lasers should be easily ignoring this due to AP
      Blunt: 27
      Heat: 13
      Slash: 20
      Shock: 30 # All the electronics is insulated in any industrial machine and the steel frame is not affected by it in any way
    durabilitytresholddict:
      Radiation: 1000
      Poison: 1000
      Airloss: 1000
      Caustic: 1000
      Piercing: 10
      Blunt: 14
      Heat: 7
      Slash: 15
      Shock: 30
    attachedColoredSprite:
      sprite: SS220/Objects/Mechs/altcores.rsi
      state: basicloadercolor
  - type: FireProtection
    reduction: 0.5
  - type: AltMech
    baseState: basicloader
    openState: basicloader
    brokenState: basicloader
    sealable: false
    transparent: true
    integrity: 250
    maxIntegrity: 250
    maximalArmMass: 250
    ownMass: 250

- type: entity
  id: MechLight
  parent: BaseAltMech
  name: LEF-021
  description: Versatile, light and still pretty cheap mech frame, LEF-021 is one of the most widely used mech frames in the TSF space
  components:
  - type: Sprite
    sprite: SS220/Objects/Mechs/cores.rsi
    state: basiclight
    noRot: true
  - type: AltArmor # Ah yes,my beloved СБЭУ
    tresholddict:
      Radiation: 1000 # As always mechs do not care about radiation/poison/airloss/etc.
      Poison: 1000
      Airloss: 1000
      Caustic: 1000
      Piercing: 15 #Numbers a bit higher compared to a strikeproof shield, bullets/lasers should be easily ignoring this due to AP
      Blunt: 20
      Heat: 13
      Slash: 20
      Shock: 30 # All the electronics is insulated in any industrial machine and the steel frame is not affected by it in any way
    durabilitytresholddict:
      Radiation: 1000
      Poison: 1000
      Airloss: 1000
      Caustic: 1000
      Piercing: 10
      Blunt: 13
      Heat: 7
      Slash: 12
      Shock: 30
  - type: AltMech
    baseState: basiclight
    openState: basiclight
    brokenState: basiclight
    integrity: 200
    maxIntegrity: 200
    ownMass: 150
    maximalArmMass: 145
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 300
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: start
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: entity
  id: MechArmoredSynth
  parent: BaseAltMech
  name: Executor
  description: The peak of modern mech design partially based on reverse-enginiered [DELETED]. Materials, drives, electronics - everything was picked without a glance on the price
  components:
  - type: Sprite
    sprite: SS220/Objects/Mechs/cores.rsi
    state: armoredsynth
    noRot: true
  - type: AltArmor
    tresholddict:
      Radiation: 1000
      Poison: 1000
      Airloss: 1000
      Caustic: 1000
      Piercing: 245 #This is a DS frame and logically a tank
      Blunt: 270
      Heat: 120
      Slash: 70
      Shock: 150
    durabilitytresholddict:
      Radiation: 1000
      Poison: 1000
      Airloss: 1000
      Caustic: 1000
      Piercing: 110
      Blunt: 150
      Heat: 120
      Slash: 70
      Shock: 150
  - type: FlashImmunity
  - type: EyeProtection
  - type: AltMech
    baseState: basiclight
    openState: basiclight
