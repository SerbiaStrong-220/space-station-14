    maxIntegrity: 300
    ownMass: 300
    maximalArmMass: 200
    transparent: true
  - type: Destructible
    thresholds:
    - trigger:
        !type:DamageTrigger
        damage: 450
      behaviors:
      - !type:PlaySoundBehavior
        sound:
          collection: MetalBreak
      - !type:ChangeConstructionNodeBehavior
        node: start
      - !type:DoActsBehavior
        acts: ["Destruction"]

- type: inventoryTemplate
  id: mech
  slots:
  - name: belt
    slotTexture: belt
    fullTextureName: template_small
    slotFlags: MECHOUTER
    slotGroup: SecondHotbar
    stripTime: 15
    uiWindowPos: 1,0
    strippingWindowPos: 0,0
    offset: 0.0, 0.0
    displayName: Belt
