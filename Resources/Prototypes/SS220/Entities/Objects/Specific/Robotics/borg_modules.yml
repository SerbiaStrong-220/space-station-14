- type: entity
  id: BaseBorgModuleSecurity
  parent: BaseBorgModule
  abstract: true
  components:
  - type: Item
    sprite: Objects/Specific/Robotics/borgmodule.rsi
    inhandVisuals:
      left:
      - state: base-icon-inhand-left
        color: "#EBD8B7"
      - state: base-module-inhand-left
        color: "#34476c"
      - state: base-part-inhand-left
      - state: base-stripes-inhand-left
        color: "#404040"
      right:
      - state: base-icon-inhand-right
        color: "#EBD8B7"
      - state: base-module-inhand-right
        color: "#34476c"
      - state: base-part-inhand-right
      - state: base-stripes-inhand-right
        color: "#404040"
  - type: Tag
    tags:
    - BorgModuleSecurity
  - type: BorgModule
    borgFitTypes:
    - borg-type-security
 
- type: entity
  id: BorgModuleProtoKineticAccelerator
  parent: [ BaseBorgModuleCargo, BaseProviderBorgModule ]
  name: protokinetic cyborg module
  components:
  - type: Sprite
    layers:
    - state: cargo
    - state: icon-ProtoKinetic-gun
  - type: ItemBorgModule
    hands:
    - item: WeaponProtoKineticAccelerator
    - item: JetpackBorgModule
    - item: HandHeldMassScannerBorg
    - item: HandheldGPSBasic

- type: entity
  id: BorgModuleFireAxe
  parent: [ BaseBorgModuleEngineering, BaseProviderBorgModule ]
  name: fire axe cyborg module
  description: A piece of tech that gives cyborgs a fire axe!
  components:
    - type: Sprite
      layers:
        - state: engineering
        - state: icon-fireaxe
          sprite: SS220/Objects/Specific/Robotics/borgmodule.rsi
    - type: ItemBorgModule
      hands:
      - item: BorgFireAxe
    - type: BorgModuleIcon
      icon: { sprite: SS220/Interface/Actions/actions_borg.rsi, state: fireaxe-module }

- type: entity
  id: BorgModuleFlamingAxe
  parent: [ BaseBorgModule, BaseProviderBorgModule ]
  name: fire axe cyborg module
  description: A piece of tech that gives cyborgs a fire axe!
  components:
    - type: Sprite
      layers:
      - state: syndicate
      - state: icon-fireaxe-flaming
        sprite: SS220/Objects/Specific/Robotics/borgmodule.rsi
    - type: ItemBorgModule
      hands:
      - item: BorgFireAxeFlaming
    - type: BorgModuleIcon
      icon: { sprite: SS220/Interface/Actions/actions_borg.rsi, state: syndicate-fireaxe-module }
    - type: HiddenDescription
      entries:
        SyndicateAgentKnowledge: [ hidden-desc-flaming-axe-module-syndicate ]
        ScienceKnowledge: [ hidden-desc-flaming-axe-module-research ]
      nameEntries:
      - [SyndicateAgentKnowledge, null]
      - [ScienceKnowledge, null]
      hiddenName: ent-BaseBorgModule

