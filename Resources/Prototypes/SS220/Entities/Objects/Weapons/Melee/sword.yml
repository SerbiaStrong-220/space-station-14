  - type: Tag
    tags:
    - MinamotoNoYorimitsu
  - type: ThrowingAngle
    angle: 300

# Рапира
- type: entity
  parent: BaseItem
  id: Rapier
  name: rapier
  description: A graceful and elegant weapon that is the perfect choice for those who prefer a sophisticated style during combat.
  suffix: 27 piercing
  components:
  - type: EmitSoundOnLand ##new sound_drop effect, add MIXnikita
    sound:
      path: /Audio/SS220/Effects/Drop/cane_blade.ogg
      params:
        volume: 2
  - type: Sharp
  - type: Sprite
    sprite: SS220/Objects/Weapons/Melee/Sword/rapier.rsi
    state: icon
  - type: MeleeWeapon
    wideAnimationRotation: -135
    attackRate: 2.5
    damage:
      types:
        Piercing: 27
    angle: 0
    soundHit:
        path: /Audio/Weapons/bladeslice.ogg
  - type: Item
    size: Normal
    sprite: SS220/Objects/Weapons/Melee/Sword/rapier.rsi
  - type: Tag
    tags:
    - Rapier
  - type: DisarmMalus
  - type: LandAtCursor
  - type: ThrowingAngle
    angle: 225
  - type: EmbeddableProjectile
    sound: /Audio/Weapons/star_hit.ogg
    offset: -0.15,0.0
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 22.5

- type: entity
  parent: Rapier
  id: RapierAlt
  suffix: 15 piercing
  components:
  - type: MeleeWeapon
    damage:
      types:
        Piercing: 15
  - type: DamageOtherOnHit
    damage:
      types:
        Piercing: 12.5

