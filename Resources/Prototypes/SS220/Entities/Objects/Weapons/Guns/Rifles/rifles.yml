- type: entity
  parent: WeaponRifleLecter
  id: WeaponRifleCommando
  name: M-53E3ST "Commando"
  description: "Modified M-53E2 for CQB. Equipped with holographic sight and integrated suppressor."
  components:
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Rifles/commando.rsi
    layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-0
        map: ["enum.GunVisualLayers.Mag"]
  - type: Clothing
    sprite: SS220/Objects/Weapons/Guns/Rifles/lecter.rsi
  - type: GunWieldBonus
    minAngle: -4
    maxAngle: -22
    angleIncrease: -1.2
  - type: GunAimable
    minAngle: -8
    maxAngle: -9
    aimedSprintSpeedModifier: 0.65
  - type: Gun
    minAngle: 13
    maxAngle: 36
    availableModes:
      - FullAuto
      - SemiAuto
    angleIncrease: 1.8
    angleDecay: 6
    muzzleFlashSupressed: true #SS220 weapon overhaul
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/ltrifle.ogg
      params:
        volume: -6
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineRifle
        insertSound: /Audio/Weapons/Guns/MagIn/ltrifle_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/ltrifle_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazineRifle
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        priority: 1
        whitelist:
          tags:
            - CartridgeRifle
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
