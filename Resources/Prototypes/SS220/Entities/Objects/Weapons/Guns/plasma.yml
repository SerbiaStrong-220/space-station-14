- type: entity
  name: energy magnum
  parent: [BaseWeaponBatterySmall, BaseGrandTheftContraband]
  id: WeaponPlasmaPistolDevastator
  description: "An outdated energy weapon firing EM-contained ionised gas. \nWhile it is a common antimaterial weapon of many well-equipped militaries it's a rare thing here in Tigarden."
  components:
  - type: Sprite
    sprite: Objects/Weapons/Guns/Battery/energy_magnum.rsi
    layers:
    - state: base
      map: [ "enum.GunVisualLayers.Base" ]
    - state: mag-unshaded-1
      visible: false
      map: [ "enum.GunVisualLayers.MagUnshaded" ]
      shader: unshaded
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: Clothing
    sprite: Objects/Weapons/Guns/Battery/energy_magnum.rsi
  - type: Gun
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/laser_cannon.ogg
    projectileSpeed: 30
  - type: ProjectileBatteryAmmoProvider
    proto: BulletPlasma
    fireCost: 1000
  - type: BatterySelfRecharger
    autoRecharge: true
    autoRechargeRate: 100
    autoRechargePause: true
    autoRechargePauseTime: 10
