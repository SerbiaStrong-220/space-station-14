- type: entity
  name: Corvus
  parent: [BaseWeaponPistol]
  id: WeaponPistolCorvus
  description: Another modification of classic Schneider&Weber P093, the Corvus is a pistol chambered in 9x20 auto with recoil compensator and stronger spring. It is favored by assasins and bodyguards because of it's small size and suppressed muzzle flash.
  components:
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Pistols/corvus.rsi
  - type: Gun
    fireRate: 6.2
  - type: GunAimable
    minAngle: -5
    maxAngle: -9
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazinePistolHighCapacity
        insertSound: /Audio/Weapons/Guns/MagIn/pistol_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/pistol_magout.ogg
        priority: 2
        whitelist:
          tags:
            - MagazinePistol
            - MagazinePistolHighCapacity
        whitelistFailPopup: gun-magazine-whitelist-fail
      gun_chamber:
        name: Chamber
        startingItem: CartridgePistol
        priority: 1
        whitelist:
          tags:
            - CartridgePistol
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: StaticPrice
    price: 1000

- type: entity
  name: taser
  parent: [BaseItem, BaseSecurityContraband]
  id: WeaponTaser
  description: A pneumatic dart gun feeding from cartridges. Darts are equipped with electrical discharger and
  components:
  - type: EmitSoundOnLand
    sound:
      path: /Audio/SS220/Effects/Drop/rifles.ogg
      params:
        volume: 2
  - type: Sprite
    sprite: Objects/Weapons/Guns/Battery/taser.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-0
      map: ["enum.GunVisualLayers.Mag"]
  - type: AmmoCounter
  - type: Gun
    fireRate: 1
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/taser.ogg
  - type: ItemSlots
    slots:
      gun_magazine:
        name: Magazine
        startingItem: MagazineTaser
        priority: 2
        whitelist:
          tags:
          - TaserCartridge
        whitelistFailPopup: gun-magazine-whitelist-fail
        insertSound: /Audio/Weapons/Guns/MagIn/smg_magin.ogg
        ejectSound: /Audio/Weapons/Guns/MagOut/smg_magout.ogg
  - type: ContainerContainer
    containers:
      gun_magazine: !type:ContainerSlot
      gun_chamber: !type:ContainerSlot
  - type: MagazineAmmoProvider
  - type: MagazineVisuals
    magState: mag
    steps: 1
    zeroVisible: true
  - type: Appearance
  - type: StaticPrice
    price: 5000
