- type: entity
  id: MagazineBoxPistolHP
  parent: BaseMagazineBoxPistol
  name: ammunition box (9x20 auto HPIB)
  description: A cardboard box of .9x20 auto rounds.
  components:
  - type: BallisticAmmoProvider
    proto: CartridgePistolHP
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: incendiary

- type: entity
  parent: BaseMagazineBoxPistol
  id: MagazineBoxPistolAP
  name: ammunition box (9x20 auto AP)
  description: A cardboard box of 9x20 auto rounds.
  components:
  - type: BallisticAmmoProvider
    proto: CartridgePistolAP
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: uranium
