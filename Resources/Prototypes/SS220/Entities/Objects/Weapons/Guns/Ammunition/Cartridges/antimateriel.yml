- type: entity
  parent: [ BaseCartridge]
  id: CartridgeAntiMaterielAP
  name: cartridge (15,24x140 AP)
  description: An antimaterial uranium-cored AP round designed to get through even the toughest armor of infantry, LAVs and mechs.
  components:
  - type: Tag
    tags:
    - CartridgeAntiMateriel
  - type: CartridgeAmmo
    proto: BulletAntiMaterielAP
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Casings/large_casing.rsi
    layers:
    - state: base
      map: ["enum.AmmoVisualLayers.Base"]
    - state: tip
      map: [ "enum.AmmoVisualLayers.Tip" ]
      color: "#65fe08"
  - type: Appearance
  - type: SpentAmmoVisuals
  - type: StaticPrice
    price: 10

