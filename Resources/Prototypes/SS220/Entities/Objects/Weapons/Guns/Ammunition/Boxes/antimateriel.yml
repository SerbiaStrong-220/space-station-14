- type: entity
  parent: BaseMagazineBoxAntiMateriel
  id: MagazineBoxAntiMaterielHP
  name: ammunition box (15,24x140 antimaterial HPIB)
  description: A cardboard box of 15,24x140 anti-materiel rounds.
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeAntiMaterielHP
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

