- type: entity
  id: MagazinePistolSubMachineGunAcp
  name: SMG magazine (.45 ACP)
  parent: [ BaseItem, BaseSecurityContraband ]
  components:
  - type: Tag
    tags:
      - MagazinePistolSubMachineGunAcp
  - type: BallisticAmmoProvider
    mayTransfer: true
    capacity: 25
    whitelist:
      tags:
      - CartridgeAmmoAcp
    proto: CartridgeAmmoAcp
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Ammunition/Magazine/sbr.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-2
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 3
    zeroVisible: false
  - type: Appearance
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container

- type: entity
  id: MagazineTaser
  name: taser cartridge
  parent: [ BaseItem, BaseSecurityContraband ]
  components:
  - type: Tag
    tags:
    - TaserCartridge
  - type: BallisticAmmoProvider
    proto: TaserDartCartridge
    cycleable: false
    mayTransfer: false
    whitelist:
      tags:
        - TaserDart
    capacity: 2
    soundRack:
      path: /Audio/Corvax/Weapons/Guns/Cock/shotgun_cock.ogg
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Ammunition/Magazine/taser.rsi
    layers:
    - state: mag
  - type: Appearance
