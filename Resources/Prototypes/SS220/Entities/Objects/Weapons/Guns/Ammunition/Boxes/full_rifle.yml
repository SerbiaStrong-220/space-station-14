- type: entity
  abstract: true
  parent: BaseItem
  id: BaseMagazineBoxFullRifle
  components:
  - type: BallisticAmmoProvider
    mayTransfer: true
    whitelist:
      tags:
        - FullRifleCartridge
    proto: BulletFullRifle
    capacity: 40
  - type: Item
    size: Small
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: Objects/Weapons/Guns/Ammunition/Boxes/light_rifle.rsi
  - type: MagazineVisuals
    magState: mag
    steps: 4
    zeroVisible: false
  - type: Appearance

- type: entity
  id: MagazineBoxFullRifleFMJ
  parent: BaseMagazineBoxFullRifle
  name: ammunition box (7,62x55 rifle FMJ)
  description: A cardboard box of 7,62x55 rifle rounds.
  components:
  - type: BallisticAmmoProvider
    proto: FullRifleCartridge
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]

- type: entity
  id: MagazineBoxFullRifleAP
  parent: BaseMagazineBoxFullRifle
  name: ammunition box (7,62x55 rifle AP)
  description: A cardboard box of 7,62x55 rifle rounds.
  components:
