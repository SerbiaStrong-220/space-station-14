- type: entity
  parent: AmmoProviderShotgunShell
  id: BoxShotgunHP
  name: ammunition box (18,5x72 HPIB)
  description: A cardboard box of 18,5x72 shotgun shells.
  components:
    - type: BallisticAmmoProvider
      proto: ShellShotgunSlugHP
    - type: MagazineVisuals
      magState: mag-incend
      steps: 5
      zeroVisible: false
    - type: Sprite
      layers:
      - state: base
        map: ["enum.GunVisualLayers.Base"]
      - state: mag-incend-1
        map: ["enum.GunVisualLayers.Mag"]
      - state: slug

