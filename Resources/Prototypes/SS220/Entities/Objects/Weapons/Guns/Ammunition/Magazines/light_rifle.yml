- type: entity
  parent: BaseMagazineLightRifle
  id: MagazineLightRifleSemiAP
  name: magazine (.30 rifle semi AP)
  description: Curved 30-round double stack magazine for combat rifles.
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeLightRifleSemiAP
  - type: Sprite
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: stripe
      color: "#7c7c7c"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#7c7c7c"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#7c7c7c"

- type: entity
  parent: BaseMagazineLightRifle
  id: MagazineLightRifleRubber
  name: magazine (.30 rifle rubber)
  components:
  - type: BallisticAmmoProvider
    proto: CartridgeLightRifleRubber
  - type: Sprite
    layers:
    - state: base
      sprite: Objects/Weapons/Guns/Ammunition/Magazine/LightRifle/light_rifle_mag.rsi
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
    - state: stripe
      color: "#1E90FF"
  - type: Item
    inhandVisuals:
      left:
      - state: inhand-left-mag
      - state: inhand-left-stripe
        color: "#245EE3"
      right:
      - state: inhand-right-mag
      - state: inhand-right-stripe
        color: "#245EE3"
