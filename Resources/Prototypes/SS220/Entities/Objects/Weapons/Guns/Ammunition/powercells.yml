#Base
- type: entity
  abstract: true
  parent: [ BaseItem, GasTankBase ]
  id: BasePowerCellBlaster
  components:
  - type: PhysicalComposition
    materialComposition:
      Steel: 150
  - type: Item
  - type: Battery
    pricePerJoule: 0.15
    maxCharge: 1000
    startingCharge: 1000
  - type: PowerCell
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Ammunition/Magazine/krs_magblaster.rsi
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: base
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
  - type: SolutionContainerManager
    solutions:
      battery:
        maxVol: 5
  - type: InjectableSolution
    solution: battery
  - type: DrawableSolution
    solution: battery
  - type: GasTank
    outputPressure: 101.3
    air:
      volume: 1.5
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Zinc
        Quantity: 5
  - type: Tag
    tags:
      - PowerCellBlaster
      - WeaponRechargerWhitelist
  - type: Appearance
  - type: BatteryVisuals
  - type: Riggable

# Standard 1000 charge battery
- type: entity
  parent: BasePowerCellBlaster
  id: PowerCellBlaster
  name: blaster power cell
  description: Standard energy cell for blaster weapons.
  suffix: Standard

- type: entity
  parent: BasePowerCellBlaster
  id: PowerCellBlasterFull
  name: blaster power cell
  description: Standard energy cell for blaster weapons.
  suffix: Full
  components:
  - type: GasTank
    outputPressure: 101.3
    air:
      # 6 minutes of agony
      volume: 1.5
      moles:
        - 0           # oxygen
        - 0           # nitrogen
        - 0           # CO2
        - 1.5 # plasma
      temperature: 120.06


# Powerful 1400 charge battery
- type: entity
  parent: BasePowerCellBlaster
  id: PowerCellBlasterHighCapacity
  name: blaster power cell
  description: High-capacity energy cell for advanced blaster weapons.
  suffix: High-Capacity
  components:
  - type: Battery
    maxCharge: 1400
    startingCharge: 1400

# Blank version for crafting/printing
- type: entity
  parent: PowerCellBlaster
  id: PowerCellBlasterPrinted
  suffix: Empty
  components:
  - type: Sprite
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: base
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o2
      shader: unshaded
      visible: false
  - type: Battery
    maxCharge: 800
    startingCharge: 0

- type: entity
  parent: BaseItem
  id: LaserSMGPowerCell
  name: Carabine power cell
  description: It contains a lot more pain than you ever dreamed of.
  suffix:  Laser
  components:
  - type: Item
  - type: Battery
    pricePerJoule: 0.15
    maxCharge: 1200
    startingCharge: 1200
  - type: BatteryVisuals
    levels: 4
  - type: PowerCell
  - type: GenericVisualizer
    visuals:
      enum.BatteryLevels.Level:
        enum.PowerCellVisualLayers.Unshaded:
          0: { visible: false }
          1: { visible: true, state: o1 }
          2: { visible: true, state: o2 }
          3: { visible: true, state: o3 }
          4: { visible: true, state: o4 }
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Ammunition/Magazine/laser_carabine.rsi
    layers:
    - map: [ "enum.PowerCellVisualLayers.Base" ]
      state: base
    - map: [ "enum.PowerCellVisualLayers.Unshaded" ]
      state: o4
      shader: unshaded
  - type: SolutionContainerManager
    solutions:
      battery:
        maxVol: 5
  - type: InjectableSolution
    solution: battery
  - type: DrawableSolution
    solution: battery
  - type: Extractable
    juiceSolution:
      reagents:
        - ReagentId: Zinc
          Quantity: 5
  - type: Tag
    tags:
      - WeaponRechargerWhitelist
      - LaserSMGPowerCell
  - type: Appearance
  - type: Riggable
  - type: AmmoCounter

