- type: entity
  id: BaseMagazineShotgunOnerow
  name: "magazine (12x72 shotgun)"
  parent: [ BaseItem, BaseSecurityContraband ]
  components:
  - type: Tag
    tags:
    - MagazineShotgun
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    mayTransfer: true
    capacity: 10
    whitelist:
      tags:
        - ShellShotgun
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Ammunition/Magazine/shotgun_onerow_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance
