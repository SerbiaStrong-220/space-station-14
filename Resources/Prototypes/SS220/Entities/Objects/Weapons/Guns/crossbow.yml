- type: entity
  name: crossbow
  parent: BaseItem
  id: BaseWeaponCrossbow
  abstract: true
  description: Energy crossbow.
  components:
  - type: EmitSoundOnLand ##new sound_drop effect, add MIXnikita
    sound:
      path: /Audio/SS220/Effects/Drop/smg.ogg
      params:
        volume: 2
  - type: AmmoCounter
  - type: UseDelayOnShoot
  - type: UseDelay
    delay: 6 #ss220 fix 4 -> 6
  - type: RechargeBasicEntityAmmo
    rechargeCooldown: 6 #NerfCrossbow
    rechargeSound:
      path: /Audio/SS220/Weapons/Guns/MagIn/draw_bow2.ogg
  - type: Gun
    fireRate: 1
    soundGunshot:
      path: /Audio/Weapons/Guns/Gunshots/taser2.ogg
  - type: Item
    size: Normal

- type: entity
  name: mini energy crossbow
  parent: BaseWeaponCrossbow
  id: WeaponMiniEnergyCrossbow
  description: A weapon favored by syndicate specialists who prefer to work covertly.
  components:
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Crossbow/minicrossbow.rsi
    state: icon
  - type: GunAimable
    minAngle: -6.5
    maxAngle: -6
  - type: Gun
    cameraRecoilScalar: 0 #Laser weapons have effectively no recoil
    maxAngle: 15
    minAngle: 9 #Very low values for the same reason
    angleIncrease: 0.09 #Basically the force of a finger pulling the trigger
  - type: BasicEntityAmmoProvider
    proto: BulletMiniEnergyCrossbow
    capacity: 1
    count: 1
  - type: Item
    size: Small
    shape:
    - 0,0,1,0
    - 0,1,0,1

- type: entity
  name: energy crossbow
  parent: WeaponMiniEnergyCrossbow
  id: WeaponEnergyCrossbow
  description: A weapon designed by reverse engineering using syndicate technology. Medium-sized and weaker than the "original".
  components:
  - type: Sprite
    sprite: SS220/Objects/Weapons/Guns/Crossbow/crossbow.rsi
    state: icon
  - type: Item
    size: Huge
  - type: BasicEntityAmmoProvider
    proto: BulletEnergyCrossbow
    capacity: 1
    count: 1
  - type: GunAimable
    minAngle: -7
    maxAngle: -5
  - type: Gun
    cameraRecoilScalar: 0
    maxAngle: 20
    minAngle: 15 #Very low values for the same reason
    angleIncrease: 0.09
  - type: GunWieldBonus
    minAngle: -5
    maxAngle: -13
  - type: Wieldable
    wieldSound:
      path: /Audio/Items/bow_pull.ogg
  - type: GunRequiresWield
  - type: UseDelay
    delay: 0.5
