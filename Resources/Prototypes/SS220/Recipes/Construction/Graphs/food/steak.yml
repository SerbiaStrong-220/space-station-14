# rabbit steak
- type: constructionGraph
  id: RabbitSteak
  start: start
  graph:

  - node: start
    edges:
    - to: cooked rabbit
      completed:
      - !type:PlaySound
        sound: /Audio/Effects/sizzle.ogg
      steps:
      - minTemperature: 345

  - node: cooked rabbit
    entity: FoodMeatRabbitSteak

# bnuuy steak
- type: constructionGraph
  id: RabbitBnuuySteak
  start: start
  graph:

  - node: start
    edges:
    - to: cooked bnuuy
      completed:
      - !type:PlaySound
        sound: /Audio/Effects/sizzle.ogg
      steps:
      - minTemperature: 345

  - node: cooked bnuuy
    entity: FoodMeatRabbitBnuuySteak

# filet migrawr
- type: constructionGraph
  id: BearSteak
  start: filet migrawr
  graph:
  - node: filet migrawr
    entity: FoodMeatBearCooked
    edges:
    - to: finished filet migrawr
      conditions:
      - !type:MinSolution
        solution: food
        reagent:
          ReagentId: ManlyDorf
        quantity: 5
      completed:
      - !type:PlaySound
        sound: /Audio/Items/Lighters/lighter1.ogg
      steps:
      - ignite: {}
        doAfter: 1

  - node: finished filet migrawr
    entity: FoodMealBearsteak
