#Bacchus' Blessing

- type: reagent
  id: Bacchus
  name: reagent-name-bacchus
  parent: BaseAlcohol
  desc: reagent-desc-bacchus
  physicalDesc: reagent-physical-desc-strong-smelling
  flavor: Bacchus
  color: "#8B4513"
  metamorphicSprite:
    sprite: SS220/Objects/Consumable/Drinks/bacchus_blessing.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 3
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: false
  metabolisms:
    Digestion:
      effects:
      - !type:SatiateThirst
        factor: 1
      - !type:AdjustReagent
        reagent: Ethanol
        amount: 1.5
      - !type:Jitter
        conditions:
        - !type:ReagentCondition
          reagent: Bacchus
          min: 1
      - !type:Drunk
        boozePower: 20
        conditions:
        - !type:ReagentCondition
          reagent: Bacchus
          min: 1
      - !type:HealthChange
        conditions:
          - !type:ReagentCondition
            reagent: Bacchus
            min: 1
          - !type:MetabolizerTypeCondition
            type: [ Dwarf ]
            inverted: true
        damage:
          types:
            Poison: 2
  fizziness: 0.2

