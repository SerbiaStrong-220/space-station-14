        type: Add
        time: 10
        conditions:
        - !type:MetabolizerTypeCondition
          type: [ Tajaran ]
  fizziness: 0.2


- type: reagent
  id: Stout
  name: reagent-name-stout
  parent: BaseAlcohol
  desc: reagent-desc-stout
  physicalDesc: reagent-physical-desc-fizzy-and-creamy
  flavor: stout
  color: "#2b1b0c"
  metamorphicSprite:
    sprite: Objects/Consumable/Drinks/beerglass.rsi
    state: icon_empty
  metamorphicMaxFillLevels: 6
  metamorphicFillBaseName: fill-
  metamorphicChangeColor: true
  metabolism:
    Drink:
      effects:
        - type: SatiateThirst
          factor: 0.9
        - type: SatiateHunger
          factor: 0.3
        - !type:AdjustReagent
          reagent: Ethanol
          amount: 0.09
        - !type:MovementSpeedModifier
          walkSpeedModifier: 0.8
          sprintSpeedModifier: 0.8
          conditions:
            - !type:ReagentCondition
              reagent: Stout
              min: 30
    Medicine:
      effects:
        - !type:HealthChange
            damage:
              types:
                Radiation: -0.3
                Blunt: -0.3
                Poison: -0.3
            conditions:
              - !type:ReagentCondition
                reagent: Stout
                min: 15
              - !type:MetabolizerTypeCondition
                type: [ Dwarf ]
  fizziness: 0.7

