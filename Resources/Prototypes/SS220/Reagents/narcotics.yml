      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
          reagent: Ephedrine
          min: 1
        reagent: Ephedrine
        amount: -20
      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
          reagent: Desoxyephedrine
          min: 1
        reagent: Desoxyephedrine
        amount: -20
      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
