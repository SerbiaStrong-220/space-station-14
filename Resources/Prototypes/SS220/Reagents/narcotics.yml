- type: reagent
  id: NeoNicotinoid
  name: reagent-name-neonicotinoid
  group: Narcotics
  desc: reagent-desc-neonicotinoid
  flavor: medicine
  color: "#C0C0C0"
  physicalDesc: reagent-physical-desc-strong-smelling
  plantMetabolism:
  - !type:PlantAdjustHealth
    amount: -5
  metabolisms:
    Narcotic:
      effects:
      - !type:HealthChange
        damage:
          types:
            Cellular: 0.02 # Smoking causes less cancer.

- type: reagent
  id: Opium
  name: reagent-name-opium
  group: Narcotics
  desc: reagent-desc-opium
  color: "#662302"
  physicalDesc: reagent-physical-desc-bitter
  flavor: medicine
  metabolisms:
    Narcotic:
      effects:
      - !type:Hallucination
        setting:
          randomEntities: HallucinationReagentOpium
          betweenHallucinations: 4
          hallucinationMinTime: 2
          hallucinationMaxTime: 10
          totalDuration: 2
          checkPockets: false
      - !type:HealthChange
          damage:
            types:
              Cerebral: 0.25
      - !type:SatiateHunger
        factor: -0.2

- type: reagent
  id: Aglomorphine
  name: reagent-name-aglomorphine
  group: Narcotics
  desc: reagent-desc-aglomorphine
  color: "#FFFFFF"
  physicalDesc: reagent-physical-desc-bitter
  flavor: medicine
  metabolisms:
    Medicine:
      effects:
      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
          reagent: Epinephrine
          min: 1
        reagent: Epinephrine
        amount: -20
      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
          reagent: Ephedrine
          min: 1
        reagent: Ephedrine
        amount: -20
      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
          reagent: Desoxyephedrine
          min: 1
        reagent: Desoxyephedrine
        amount: -20
      - !type:AdjustReagent
        conditions:
        - !type:ReagentCondition
          reagent: Stimulants
          min: 1
        reagent: Stimulants
        amount: -20
    Poison:
      metabolismRate: 0.5
      effects:
      - !type:HealthChange
        conditions:
        - !type:ReagentCondition
          reagent: Aglomorphine
          min: 10
        damage:
          types:
            Cerebral: 2.0
            Poison: 3.0
    Narcotic:
      metabolismRate: 0.1
      effects:
      - !type:MovementSpeedModifier
        walkSpeedModifier: 1.0
        sprintSpeedModifier: 0.95
      - !type:Jitter
      - !type:MobThresholdsModifier
        statusEffectId: MobThresholdsModifierAglomorphine
        duration: 5
        refresh: false

