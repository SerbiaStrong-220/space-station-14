- type: species
  id: Ipc
  name: species-name-ipc
  roundStart: true
  prototype: MobIpc
  sprites: MobIpcSprites
  defaultSkinTone: "#eb943d"
  markingLimits: MobIpcMarkingLimits
  dollPrototype: MobIpcDummy
  skinColoration: Hues
  maleFirstNames: NamesIpcFirstMale
  femaleFirstNames: NamesIpcFirstFemale
  maleLastNames: NamesIpcLast
  femaleLastNames: NamesIpcLast
  minAge: 0

- type: speciesBaseSprites
  id: MobIpcSprites
  sprites:
    Head: MobIpcHead
    Snout: MobHumanoidAnyMarking
    HeadTop: MobHumanoidAnyMarking
    HeadSide: MobHumanoidAnyMarking
    Tail: MobHumanoidAnyMarking
    Hair: MobHumanoidMarkingMatchSkin
    Chest: MobIpcTorso
    LArm: MobIpcLArm
    RArm: MobIpcRArm
    LHand: MobIpcLHand
    RHand: MobIpcRHand
    LLeg: MobIpcLLeg
    RLeg: MobIpcRLeg
    LFoot: MobIpcLFoot
    RFoot: MobIpcRFoot

- type: markingPoints
  id: MobIpcMarkingLimits
  onlyWhitelisted: true
  points:
    Hair:
      points: 1
      required: true
      defaultMarkings: [ RobotAntennaTv, RobotAntennaTesla, RobotAntennaCat ]
    FacialHair:
      points: 1
      required: false
    HeadTop:
      points: 2
      required: false
    UndergarmentTop:
      points: 1
      required: false
    Chest:
      points: 0
      required: false
    Legs:
      points: 0
      required: false
    Arms:
      points: 0
      required: false
    Snout:
      points: 1
      required: false
      defaultMarkings: [ ScreenHeart ]

