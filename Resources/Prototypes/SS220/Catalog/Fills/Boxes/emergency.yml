- type: entity
  name: survival box
  parent: BoxCardboard
  id: BoxSurvivalBrigmedic
  description: It's a box with basic internals inside.
  suffix: MedSec
  components:
  - type: Item
    size: Large
    shape:
    - 0,0,2,1
  - type: Storage
    maxItemSize: Small
    grid:
    - 0,0,2,3
  - type: EntityTableContainerFill
    containers:
      storagebase: !type:AllSelector
        children:
        - id: ClothingMaskBreathMedicalSecurity
        - id: EmergencyOxygenTankFilled
        - id: EmergencyMedipen
        - id: SpaceMedipen
        - id: Flare
        - id: FoodSnackNutribrick
        - id: DrinkWaterBottleFull
  - type: Sprite
    layers:
    - state: internals
    - state: emergencytank

