- type: entity
  id: ActionToggleQuadHearing
  name: Activate Quad Hearing
  components:
  - type: Action
    itemIconStyle: BigAction
    useDelay: 5
    priority: -2
    icon:
      sprite: SS220/Interface/Actions/quad_hearing.rsi
      state: icon-resomi-off
    iconOn:
      sprite: SS220/Interface/Actions/quad_hearing.rsi
      state: icon-resomi-on
  - type: InstantAction
    event: !type:ToggleQuadHearingEvent
