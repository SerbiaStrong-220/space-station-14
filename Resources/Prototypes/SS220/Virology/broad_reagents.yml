# Station-wide antivirals with no recipe. While metabolising in a living carrier they act on EVERY strain it
# holds: ganoderma clears them all, birfungin drives them dormant. Handled by VirusInfectionSystem.
- type: virusBroadReagent
  id: GanodermaCure
  reagent: GanodermaExtract
  action: Cure

- type: virusBroadReagent
  id: BirfunginSuppress
  reagent: Birfungin
  action: Suppress
