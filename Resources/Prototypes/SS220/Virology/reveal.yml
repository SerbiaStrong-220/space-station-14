# Reveal chemistry: a dose of the matching reagent exposes one random symptom of a same-genome virus in a
# solution. Nicergoline reads DNA symptoms, Heparin reads RNA ones. A dose that lands on an already-known
# symptom is spent for nothing.
- type: virusReveal
  id: NicergolineDna
  reagent: Nicergoline
  genome: Dna
  revealSound:
    path: /Audio/Effects/Chemistry/bubbles.ogg

- type: virusReveal
  id: HeparinRna
  reagent: Heparin
  genome: Rna
  revealSound:
    path: /Audio/Effects/Chemistry/bubbles.ogg
