- type: entity
  name: Urist McResomi
  parent:
  - AppearanceResomi
  - BaseSpeciesMobOrganic
  id: MobResomi
  components:
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Resomi
  # - type: TypingIndicator
  #   proto: resomi
#  - type: ResomiAccent
  # - type: Vocal
    # sounds:
    #   Male: Resomi
    #   Female: Resomi
    #   Unsexed: Resomi
  # - type: Speech
    # speechSounds: Resomi
    # speechVerb: Resomi
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 0.9
    soundHit:
      path: /Audio/Effects/hit_kick.ogg
  - type: Butcherable
    butcheringType: Spike
    spawned:
      - id: FoodMeat
        amount: 5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.25
        density: 185
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: DamageVisuals
    damageOverlayGroups:
      Brute:
        sprite: SS220/Mobs/Effects/resomi_brute_damage.rsi
        color: "#ff05ff"
      Burn:
        sprite: SS220/Mobs/Effects/resomi_burn_damage.rsi
  - type: TemperatureDamage # Пошаманить потом
    heatDamageThreshold: 320
    coldDamageThreshold: 230
    coldDamage:
      types:
        Cold: 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 2 #per second, scales with temperature & other constants
  - type: Temperature
    currentTemperature: 310.15
    specificHeat: 42
  - type: TemperatureSpeed
    thresholds:
      289: 0.8
      275: 0.6
      250: 0.4
  - type: Language
    availableLanguages:
    - id: Galactic
    # - id: Язык резоми
  - type: LimitationRevive
    reviveLimit: 3
  - type: Bloodstream
    bloodReagent: ResomiBlood


- type: entity
