    sprite: SS220/Mobs/Species/Resomi/parts.rsi
  - type: VisualOrgan
    data:
      sprite: SS220/Mobs/Species/Resomi/parts.rsi
  - type: VisualOrganMarkings
    markingData:
      group: Resomi
  - type: Extractable
    juiceSolution:
      reagents:
      - ReagentId: Fat
        Quantity: 3
      - ReagentId: ResomiBlood
        Quantity: 10

