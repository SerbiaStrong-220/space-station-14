    maxReagents: 3
    metabolizerTypes: [ Animal ]
    groups:
    - id: Food
    - id: Drink
    - id: Omnivorous

- type: entity
  parent: OrganResomi
  id: OrganResomiInternal
  abstract: true
  components:
  - type: Sprite
