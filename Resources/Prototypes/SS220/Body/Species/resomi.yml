- type: markingsGroup
  parent: Undergarments
  id: Resomi
  onlyGroupWhitelisted: true
  limits:
    enum.HumanoidVisualLayers.LHand:
      limit: 1
      required: false
      default: [ ResomiLHandFeathers ]
    enum.HumanoidVisualLayers.RHand:
      limit: 1
      required: false
      default: [ ResomiRHandFeathers ]
    enum.HumanoidVisualLayers.LFoot:
      limit: 1
      required: false
      default: [ ResomiLFootFeathers ]
    enum.HumanoidVisualLayers.RFoot:
      limit: 1
      required: false
      default:  [ ResomiRFootFeathers ]
    enum.HumanoidVisualLayers.Chest:
      limit: 1
      required: true
      default: [ ResomiChestFeathers ]
    enum.HumanoidVisualLayers.Tail:
      limit: 1
      required: true
      default: [ ResomiTail ]

