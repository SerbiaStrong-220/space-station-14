- type: entity
  name: Urist McResomi
  parent:
  - AppearanceResomi
  - BaseSpeciesMobOrganic
  id: MobResomi
  components:
  - type: MovementSpeedModifier
    baseWalkSpeed : 3.6
    baseSprintSpeed : 4.5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.25
        density: 62
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: MobCollision
    strength: 12
  - type: Language
    availableLanguages:
    - id: Galactic
    - id: Schechi
  - type: Butcherable
    butcheringType: Spike
    spawned:
      - id: FoodMeat
        amount: 5
  - type: ResomiAccent
  - type: Speech
    speechSounds: MaleResomi
    speechVerb: Parrot
  # - type: TypingIndicator
  #   proto: resomi
  - type: CreamPied
    sprite:
      sprite: SS220/Effects/creampie.rsi
      state: creampie_resomi
  - type: Vocal
    sounds:
      Male: MaleResomi
      Female: FemaleResomi
      Unsexed: MaleResomi
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Resomi
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 0.9
    soundHit:
      path: /Audio/Effects/hit_kick.ogg
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: DamageVisuals
    thresholds: [ 10, 30, 50, 70 ]
    damageOverlayGroups:
      Brute:
        sprite: SS220/Mobs/Effects/Resomi/brute_damage.rsi
        color: "#cfa7ff"
      Burn:
        sprite: SS220/Mobs/Effects/Resomi/burn_damage.rsi
  - type: TemperatureDamage
    heatDamageThreshold: 305.85    # 305.85 K = 32.70 °C
    coldDamageThreshold: 205.15    # 205.15 K = -68 °C
    coldDamage:
      types:
        Cold: 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat: 2 #per second, scales with temperature & other constants
  - type: Temperature
    currentTemperature: 255.5
    specificHeat: 42
  - type: TemperatureSpeed
    thresholds:
      155: 0.4
      175: 0.6
      200: 1.0
      325: 1.0
      350: 0.8
      380: 0.6
  - type: ThermalRegulator
    normalBodyTemperature: 255.5
  - type: Bloodstream
    bloodReferenceSolution:
      reagents:
      - ReagentId: ResomiBlood
        Quantity: 180
    bloodlossDamage:
      types:
        Bloodloss: 0.5
    bloodlossHealDamage:
      types:
        Bloodloss: -1
  - type: QuadHearing


- type: entity
