- type: markingGroup
  parent: Undergarments
  id: Tajaran
  onlyWhitelisted: true
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ TajaranTail ]
    Snout:
      points: 1
      required: true
      defaultMarkings: [ TajaranSnout ]
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [ TajaranEars ]
    HeadSide:
      points: 0
      required: false

- type: entity
  name: tajaran appearance Urist McTajaran
  parent: BaseSpeciesAppearance
  id: AppearanceTajaran
  components:
  - type: Inventory
    speciesId: Tajaran
    femaleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: SS220/Mobs/Species/Tajaran/displacement.rsi
            state: jumpsuit-female
    maleDisplacements:
      jumpsuit:
        sizeMaps:
          32:
            sprite: SS220/Mobs/Species/Tajaran/displacement.rsi
            state: jumpsuit-male
  - type: EntityTableContainerFill
    containers:
      body_organs: !type:AllSelector
        children:
        - id: OrganTajaranTorso
        - id: OrganTajaranHead
        - id: OrganTajaranArmLeft
        - id: OrganTajaranArmRight
        - id: OrganTajaranHandRight
        - id: OrganTajaranHandLeft
        - id: OrganTajaranLegLeft
        - id: OrganTajaranLegRight
        - id: OrganTajaranFootLeft
        - id: OrganTajaranFootRight
        - id: OrganTajaranBrain
        - id: OrganTajaranEyes
        - id: OrganTajaranTongue
        - id: OrganTajaranAppendix
        - id: OrganTajaranEars
        - id: OrganTajaranLungs
        - id: OrganTajaranHeart
        - id: OrganTajaranStomach
        - id: OrganTajaranLiver
        - id: OrganTajaranKidneys
  - type: HumanoidAppearance
    species: Tajaran
    hideLayersOnEquip:
    - Snout
    - HeadTop
    - HeadSide
    - Tail
    undergarmentBottom: UndergarmentBottomBoxersTajaran # TODO SS220 Sprites

- type: entity
  save: false
  name: Urist McTajaran
  parent:
  - AppearanceTajaran
  - BaseSpeciesMobOrganic
  id: BaseMobTajaran
  components:
  - type: Icon
    sprite: SS220/Mobs/Species/Tajaran/parts.rsi
    state: full
  - type: Sprite
    noRot: true
    drawdepth: Mobs
    scale: 0.95, 0.95
  - type: Body
    prototype: Tajaran
    requiredLegs: 2
    #акцент, эмоуты, хвост и маски
  - type: Damageable
    damageContainer: Biological
    damageModifierSet: Tajaran
  - type: TajaranAccent
  - type: TypingIndicator
    proto: tajaran
  - type: Wagging
    action: ActionToggleWaggingTajaran
  - type: Vocal
    sounds:
      Male: MaleTajaran
      Female: FemaleTajaran
      Unsexed: MaleTajaran
  - type: Speech
    speechSounds: Alto
    speechVerb: Tajaran
    allowedEmotes: ['Growl','Purr','Hiss','Meow','Mrow']
  - type: DamageOnHighSpeedImpact
    damage:
      types:
        Blunt: 0.9
    soundHit:
      path: /Audio/Effects/hit_kick.ogg
  - type: Perishable
  - type: Butcherable
    butcheringType: Spike
    spawned:
      - id: FoodMeat
        amount: 5
  - type: Fixtures
    fixtures:
      fix1:
        shape:
          !type:PhysShapeCircle
          radius: 0.35
        density: 185
        restitution: 0.0
        mask:
        - MobMask
        layer:
        - MobLayer
  - type: Emoting
    chatEmoteCooldown: 5.0
  - type: Thirst
  - type: Hunger
  - type: MeleeWeapon
    soundHit:
      collection: AlienClaw
    angle: 30
    animation: WeaponArcClaw
    damage:
      types:
        Slash: 5
  - type: Temperature
    heatDamageThreshold: 320
    coldDamageThreshold: 230
    currentTemperature: 310.15
    specificHeat: 42
    coldDamage:
      types:
        Cold : 0.05 #per second, scales with temperature & other constants
    heatDamage:
      types:
        Heat : 2 #per second, scales with temperature & other constants
  - type: TemperatureSpeed
    thresholds:
      289: 0.8
      275: 0.6
      250: 0.4
  - type: KeenHearing
    visionRadius: 5
    highSensitiveVisionRadius: 2
    addAction: true
  - type: Language
    selectedLanguage: Galactic
    availableLanguages:
    - id: Galactic
    - id: Siiktajr
  - type: LimitationRevive
    reviveLimit: 3


