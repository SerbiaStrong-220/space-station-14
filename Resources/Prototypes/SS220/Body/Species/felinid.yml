- type: markingsGroup
  parent: Undergarments
  id: Felinid
  onlyWhitelisted: true
  points:
    Hair:
      points: 1
      required: false
    FacialHair:
      points: 1
      required: false
    Tail:
      points: 1
      required: true
      defaultMarkings: [ FelinidTails ]
    HeadTop:
      points: 1
      required: true
      defaultMarkings: [ FelinidEars ]
    Chest:
      points: 1
      required: false
    Legs:
      points: 2
      required: false
    Arms:
      points: 2
      required: false

- type: entity
  name: felinid appearance
  parent: BaseSpeciesAppearance
  id: AppearanceFelinid
  components:
  - type: Inventory
    speciesId: Felinid
  - type: InitialBody
    organs:
      Torso: OrganHumanTorso
      Head: OrganHumanHead
      ArmLeft: OrganHumanArmLeft
      ArmRight: OrganHumanArmRight
      HandRight: OrganHumanHandRight
      HandLeft: OrganHumanHandLeft
      LegLeft: OrganHumanLegLeft
      LegRight: OrganHumanLegRight
      FootLeft: OrganHumanFootLeft
      FootRight: OrganHumanFootRight
      Brain: OrganHumanBrain
      Eyes: OrganHumanEyes
      Tongue: OrganHumanTongue
      Appendix: OrganHumanAppendix
      Ears: OrganHumanEars
      Lungs: OrganHumanLungs
      Heart: OrganAnimalHeart
      Stomach: OrganTajaranStomach
      Liver: OrganAnimalLiver
      Kidneys: OrganHumanKidneys
  - type: HumanoidProfile
    species: Felinid

- type: entity
  name: Urist McFelinid
  parent:
  - AppearanceFelinid
  - BaseSpeciesMobOrganic
  id: MobFelinid
  components:
  - type: InteractionPopup
    successChance: 1
    interactSuccessString: hugging-success-generic
    interactSuccessSound: /Audio/Effects/thudswoosh.ogg
    messagePerceivedByOthers: hugging-success-generic-others
  - type: OwOAccent
  - type: Vocal
    wilhelm: "/Audio/Voice/Felinid/cat_wilhelm.ogg"
    sounds:
      Male: MaleFelinid
      Female: FemaleFelinid
      Unsexed: MaleFelinid
  - type: CombatMode # remove disarm ability
