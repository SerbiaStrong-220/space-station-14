- type: entity
  id: PirateLootPad
  parent: CargoPallet
  name: pirate loot pad
  description: Sell stolen goods here for physical currency.
  components:
  - type: PirateLootPad

- type: entity
  id: PirateLootConsole
  parent: BaseComputerAiAccess
  name: pirate loot console
  description: Appraises and sells stolen goods for physical currency.
  components:
  - type: Sprite
    layers:
    - map: ["computerLayerBody"]
      state: computer
    - map: ["computerLayerKeyboard"]
      state: generic_keyboard
    - map: ["computerLayerScreen"]
      state: transfer
    - map: ["computerLayerKeys"]
      state: generic_keys
    - map: ["enum.WiresVisualLayers.MaintenancePanel"]
      state: generic_panel_open
  - type: Anchorable
    flags:
    - Anchorable
  - type: PirateLootConsole
  - type: ActivatableUI
    key: enum.PirateLootConsoleUiKey.Key
  - type: UserInterface
    interfaces:
      enum.PirateLootConsoleUiKey.Key:
        type: PirateLootConsoleBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface

- type: entity
  id: PirateMarketConsole
  parent: BaseComputer
  name: pirate market console
  description: A cash-only black market terminal.
  components:
  - type: Sprite
    sprite: Structures/Machines/computers.rsi
    state: cargo
  - type: PirateMarketConsole
  - type: ActivatableUI
    key: enum.StoreUiKey.Key
  - type: UserInterface
    interfaces:
      enum.StoreUiKey.Key:
        type: StoreBoundUserInterface
      enum.WiresUiKey.Key:
        type: WiresBoundUserInterface
  - type: Store
    name: pirate-market-store-name
    categories:
    - PirateMarketWeapons
    - PirateMarketAmmo
    - PirateMarketExplosives
    - PirateMarketMedical
    - PirateMarketImplants
    - PirateMarketAllies
    - PirateMarketEquipment
    - PirateMarketMisc
    currencyWhitelist:
    - PirateCredit
    balance:
      PirateCredit: 0
    expectedFaction:
    - Syndicate

- type: entity
  id: PirateFulton
  parent: Fulton
  name: pirate fulton
  description: A rapid extraction balloon.
  components:
  - type: Fulton
    applyDuration: 1
    duration: 20
  - type: Sprite
    sprite: SS220/Objects/Tools/pirate_fulton.rsi
    state: extraction_pack

- type: entity
  id: PirateRecruitmentContract
  parent: BaseItem
  name: pirate recruitment contract
  description: An offer to join a pirate crew.
  components:
  - type: Sprite
    sprite: Objects/Misc/bureaucracy.rsi
    layers:
    - state: paper
    - state: paper_words
      map: ["enum.PaperVisualLayers.Writing"]
      visible: true
    - state: paper_stamp-generic
      map: ["enum.PaperVisualLayers.Stamp"]
      visible: false
  - type: Item
    size: Tiny
  - type: Tag
    tags:
    - Document
    - Paper
  - type: Appearance
  - type: Paper
    content: pirate-recruitment-contract-content
    editingDisabled: true
  - type: PaperLabelType
  - type: ActivatableUI
    key: enum.PaperUiKey.Key
    requiresComplex: false
  - type: UserInterface
    interfaces:
      enum.PaperUiKey.Key:
        type: PaperBoundUserInterface
  - type: PaperVisuals
  - type: PirateRecruitmentContract

- type: entity
