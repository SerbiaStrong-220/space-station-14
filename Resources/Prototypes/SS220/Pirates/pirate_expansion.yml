- type: entity
  parent: BaseMindRoleAntag
  id: MindRolePirateExpansion
  name: pirate crew member
  components:
  - type: MindRole
    roleType: TeamAntagonist
    subtype: pirate-role-name
  - type: PirateCrewRole
  - type: RoleBriefing
    briefing: pirate-expansion-role-briefing

- type: entity
  parent: MindRolePirateExpansion
  id: MindRolePirateCaptainExpansion
  name: pirate captain
  components:
  - type: MindRole
    roleType: TeamAntagonist
    subtype: pirate-captain-role-name

- type: entity
  parent: BaseObjective
  id: PirateLootValueObjective
  components:
  - type: Objective
    difficulty: 1
    issuer: pirate-objective-issuer
    icon:
      sprite: Objects/Economy/cash.rsi
      state: cash_1000000
  - type: PirateLootValueCondition
    target: 500000

- type: entity
  parent: BaseObjective
  id: PirateCrewCaptureObjective
  components:
  - type: Objective
    difficulty: 1
    issuer: pirate-objective-issuer
    icon:
      sprite: Objects/Misc/handcuffs.rsi
      state: handcuff
  - type: PirateCrewCaptureCondition
    target: 3

- type: entity
  id: PirateExpansionRule
  parent: BaseGameRule
  components:
  - type: PirateGameRule
  - type: AntagObjectives
    objectives:
    - PirateLootValueObjective
    - PirateCrewCaptureObjective
  - type: RuleGrids
  - type: LoadMapRule
    mapPath: /Maps/SS220/Pirates/pirate_expansion.yml
  - type: AntagLoadProfileRule
  - type: AntagSelection
    selectionTime: PrePlayerSpawn
    definitions:
    - spawnerPrototype: SpawnPointPirateCaptainExpansion
      pickPlayer: false
      min: 1
      max: 1
      playerRatio: 100
      startingGear: PirateExpansionCaptainGear
      roleLoadout:
      - RoleSurvivalEVA
      components:
      - type: NpcFactionMember
        factions: [ Syndicate ]
      mindRoles: [ MindRolePirateCaptainExpansion ]
    - spawnerPrototype: SpawnPointPirateCrewExpansion
      pickPlayer: false
      min: 4
      max: 4
      playerRatio: 100
      startingGear: PirateExpansionCrewGear
      roleLoadout:
      - RoleSurvivalEVA
      components:
      - type: NpcFactionMember
        factions: [ Syndicate ]
      mindRoles: [ MindRolePirateExpansion ]

- type: gamePreset
  id: PirateExpansion
  alias:
  - pirates
  name: pirate-expansion-title
  description: pirate-expansion-description
  showInVote: false
  rules:
  - PirateExpansionRule
