- type: entity
  id: BaseMagazineFullRifle
  name: "magazine (7,62x55 full rifle)"
  parent: [ BaseItem, BaseSecurityContraband ]
  components:
  - type: Tag
    tags:
    - FullRifleMagazine
  - type: Item
    size: Small
  - type: BallisticAmmoProvider
    mayTransfer: true
    capacity: 20
    whitelist:
      tags:
        - FullRifleCartridge
  - type: ContainerContainer
    containers:
      ballistic-ammo: !type:Container
  - type: Sprite
    sprite: FCB/Objects/Weapons/Guns/Ammunition/Magazine/full_rifle_mag.rsi
    layers:
    - state: base
      map: ["enum.GunVisualLayers.Base"]
    - state: mag-1
      map: ["enum.GunVisualLayers.Mag"]
  - type: MagazineVisuals
    magState: mag
    steps: 2
    zeroVisible: false
  - type: Appearance

- type: entity
  id: MagazineFullRifleFMJ
  name: "magazine (7,62x55 full rifle FMJ)"
  parent: BaseMagazineFullRifle
  components:
  - type: BallisticAmmoProvider
    proto: FullRifleCartridge
