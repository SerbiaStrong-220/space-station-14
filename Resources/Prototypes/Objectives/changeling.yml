# SS220 Changeling
- type: entity
  abstract: true
  parent: BaseObjective
  id: BaseChangelingObjective
  components:
  - type: Objective
    issuer: objective-issuer-changeling
    difficulty: 1
  - type: RoleRequirement
    roles:
    - ChangelingRole

- type: entity
  parent: BaseChangelingObjective
  id: ChangelingAbsorbDnaObjective
  name: Absorb unique DNA strains.
  description: Acquire enough unique compatible genomes.
  components:
  - type: Objective
    difficulty: 1
    icon:
      sprite: _Goobstation/Changeling/changeling_objectives.rsi
      state: absorb
  - type: ChangelingAbsorbDnaCondition
    minGenomes: 6
    maxGenomes: 8

- type: entity
  parent: BaseChangelingObjective
  id: ChangelingStealBrainObjective
  name: Steal a specific crew member's brain.
  description: Remove the target's brain and keep it in your possession.
  components:
  - type: Objective
    difficulty: 2.75
    icon:
      sprite: Mobs/Species/Human/organs.rsi
      state: brain
  - type: ChangelingStealBrainCondition

- type: entity
  parent: BaseChangelingObjective
  id: ChangelingKillStationAiObjective
  description: Destroy the station AI before escaping.
  components:
  - type: Objective
    difficulty: 3
    icon:
      sprite: Mobs/Silicon/station_ai.rsi
      state: ai_dead
  - type: TargetObjective
    title: objective-condition-kill-station-ai
  - type: ChangelingKillStationAiCondition

- type: entity
  parent: BaseChangelingObjective
  id: ChangelingKillAndImpersonateObjective
  description: Kill the target, then escape in their form or carrying their original ID card.
  components:
  - type: Objective
    difficulty: 3
    icon:
      sprite: Objects/Weapons/Guns/Pistols/viper.rsi
      state: icon
  - type: TargetObjective
    title: objective-condition-kill-head-title
  - type: ChangelingKillAndImpersonateCondition

- type: entity
  parent: BaseChangelingObjective
  id: ChangelingEscapeShuttleObjective
  name: Escape to CentComm alive via the emergency shuttle.
  description: Survive and leave the station aboard the emergency shuttle.
  components:
  - type: Objective
    difficulty: 1
    icon:
      sprite: _Goobstation/Changeling/changeling_objectives.rsi
      state: survive
  - type: ChangelingEscapeAliveCondition

- type: entity
  abstract: true
  parent: [BaseChangelingObjective, BaseStealObjective]
  id: BaseChangelingStealObjective
  components:
  - type: Objective
    difficulty: 2.75
  - type: StealCondition
    verifyMapExistence: true

- type: entity
